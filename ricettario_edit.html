<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ricettario Pro">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='115' fill='%23F5F0E8'/%3E%3Ctext x='256' y='330' font-size='300' text-anchor='middle'%3E%F0%9F%93%96%3C/text%3E%3C/svg%3E">
<title>📖 Ricettario Pro — Matteo La Spada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Source+Serif+4:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:       #F8F4EE;
  --surface:  #FFFFFF;
  --surface2: #F2EDE4;
  --border:   #DDD5C8;
  --accent:   #8B4A1C;
  --accent2:  #C4782A;
  --text:     #1E1208;
  --muted:    #7A6A58;
  --green:    #2D6A4F;
  --red:      #C0392B;
  --gold:     #C4782A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}

/* ── HEADER ── */
header{
  background:var(--accent);
  padding:env(safe-area-inset-top,20px) 16px 16px;
  padding-top:calc(env(safe-area-inset-top,0px) + 20px);
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(139,74,28,0.25);
}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.hdr-logo{width:38px;height:38px;background:rgba(255,255,255,0.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hdr-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#FFF8F0;font-style:italic}
.hdr-sub{font-size:10px;color:rgba(255,248,240,0.65);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted)}
.search-box{
  background:#FFF8F0;border:none;border-radius:12px;
  padding:11px 14px 11px 36px;width:100%;
  font-family:'Source Serif 4',serif;font-size:14px;color:var(--text);outline:none;
}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-top:10px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);
  border-radius:20px;padding:5px 13px;
  font-family:'Source Serif 4',serif;font-size:11px;color:rgba(255,248,240,0.8);
  cursor:pointer;white-space:nowrap;
}
.filter-btn.active{background:#FFF8F0;border-color:#FFF8F0;color:var(--accent);font-weight:600}

/* ── COUNT ── */
.count-bar{font-size:10px;color:var(--muted);padding:12px 16px 0;letter-spacing:1px;text-transform:uppercase;font-family:'DM Mono',monospace}

/* ── LISTA ── */
.recipe-list{padding:10px 12px;display:flex;flex-direction:column;gap:10px}

/* ── CARD ── */
.recipe-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;overflow:hidden;
  box-shadow:0 2px 8px rgba(139,74,28,0.06);
  transition:border-color 0.2s,box-shadow 0.2s;
}
.recipe-card.open{border-color:var(--accent2);box-shadow:0 4px 18px rgba(139,74,28,0.12)}

.recipe-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;user-select:none;-webkit-user-select:none}
.recipe-emoji{font-size:28px;line-height:1;flex-shrink:0;width:40px;text-align:center}
.recipe-info{flex:1;min-width:0}
.recipe-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--text);line-height:1.3}
.recipe-meta{font-size:10px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
.recipe-tag{font-size:9px;background:rgba(196,120,42,0.1);border:1px solid rgba(196,120,42,0.25);border-radius:6px;padding:2px 7px;color:var(--accent2);white-space:nowrap;display:inline-block;margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:0.5px}
.recipe-arrow{color:var(--muted);font-size:10px;transition:transform 0.25s;flex-shrink:0}
.recipe-card.open .recipe-arrow{transform:rotate(180deg);color:var(--accent)}

.recipe-body{display:none;border-top:1px solid var(--border)}
.recipe-card.open .recipe-body{display:block}

/* ── MOLTIPLICATORE ── */
.mult-bar{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--surface2);border-bottom:1px solid var(--border);
}
.mult-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex:1;font-family:'DM Mono',monospace}
.mult-btn{
  background:var(--surface);border:1.5px solid var(--border);border-radius:9px;
  width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-family:inherit;
  transition:all 0.15s;
}
.mult-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.mult-value{font-size:16px;font-weight:600;color:var(--accent);min-width:36px;text-align:center;font-family:'DM Mono',monospace}

/* ── SEZIONE LABEL ── */
.section-label{
  font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;
  padding:14px 16px 6px;font-weight:600;font-family:'DM Mono',monospace;
  display:flex;align-items:center;justify-content:space-between;
}
.btn-add-ing{
  background:rgba(196,120,42,0.1);border:1px solid rgba(196,120,42,0.3);
  border-radius:8px;padding:4px 10px;font-size:10px;color:var(--accent2);
  cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:0.3px;
}
.btn-add-ing:active{background:var(--accent2);color:#fff}

/* ── TABELLA INGREDIENTI ── */
.ing-table{width:100%;border-collapse:collapse}
.ing-row{border-bottom:1px solid var(--border);display:flex;align-items:center}
.ing-row:last-child{border-bottom:none}

.ing-name-cell{flex:1;padding:0}
.ing-qty-cell{padding:0;display:flex;align-items:center;gap:4px;flex-shrink:0}
.ing-del-cell{padding:0 8px 0 4px;flex-shrink:0}

/* Campi editabili */
.ing-name-input{
  background:transparent;border:none;outline:none;
  padding:11px 8px 11px 16px;font-size:13px;color:var(--text);
  font-family:'Source Serif 4',serif;width:100%;
}
.ing-name-input:focus{background:rgba(196,120,42,0.05)}

.ing-qty-input{
  background:transparent;border:none;outline:none;
  padding:11px 4px;font-size:13px;font-weight:600;color:var(--accent);
  font-family:'DM Mono',monospace;width:62px;text-align:right;
}
.ing-qty-input:focus{background:rgba(196,120,42,0.05);border-radius:6px}

.ing-unit-input{
  background:transparent;border:none;outline:none;
  padding:11px 4px;font-size:11px;color:var(--muted);
  font-family:'DM Mono',monospace;width:30px;
}

.btn-del-ing{
  background:none;border:none;font-size:14px;color:var(--muted);cursor:pointer;
  padding:4px;border-radius:6px;line-height:1;
}
.btn-del-ing:active{background:rgba(192,57,43,0.1);color:var(--red)}

/* ── ISTRUZIONI ── */
.istr-block{padding:14px 16px;border-top:1px solid var(--border);background:var(--surface2)}
.istr-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:10px;font-family:'DM Mono',monospace}
.istr-textarea{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;
  font-family:'Source Serif 4',serif;font-size:13px;color:var(--text);
  line-height:1.7;outline:none;resize:vertical;min-height:80px;
}
.istr-textarea:focus{border-color:var(--accent2)}

/* ── SHARE BAR ── */
.share-bar{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.btn-wa{
  flex:1;background:linear-gradient(135deg,#25d366 0%,#128c7e 100%);
  border:none;border-radius:12px;padding:13px 16px;
  font-family:'Source Serif 4',serif;font-size:13px;font-weight:600;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-wa:active{opacity:0.85}
.btn-reset{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:12px;padding:13px 14px;font-size:13px;color:var(--muted);
  cursor:pointer;font-family:inherit;
}
.btn-reset:active{background:var(--border)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;font-size:13px;font-weight:600;
  padding:10px 22px;border-radius:20px;z-index:9999;opacity:0;
  transition:opacity 0.3s;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 16px rgba(139,74,28,0.3);
}
.toast.show{opacity:1}

/* ── PRINT CARD (per screenshot WA) ── */
.print-card-wa{
  position:fixed;left:-9999px;top:0;width:420px;
  background:#FFFDF8;color:#1E1208;
  font-family:'Georgia',serif;padding:28px 24px;
}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="hdr-logo">🐻</div>
    <div>
      <div class="hdr-title">Ricettario</div>

    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-box" type="text" placeholder="Cerca ricetta o categoria..." oninput="filterRecipes(this.value)">

  <div class="filter-row" id="filterRow"></div>
</header>

<div class="count-bar" id="countBar"></div>
<div class="recipe-list" id="recipeList"></div>
<div class="toast" id="toast"></div>

// ── STATO CON PERSISTENZA localStorage ──
var multipliers = {};
var editedRecipes = {};

function saveToStorage(){
  try{
    localStorage.setItem('ricettario_recipes', JSON.stringify(editedRecipes));
    localStorage.setItem('ricettario_mult', JSON.stringify(multipliers));
  }catch(e){}
}

function loadFromStorage(){
  try{
    var savedR = localStorage.getItem('ricettario_recipes');
    var savedM = localStorage.getItem('ricettario_mult');
    if(savedR) editedRecipes = JSON.parse(savedR);
    if(savedM) multipliers = JSON.parse(savedM);
  }catch(e){}
}

// Inizializza con i valori base
BASE_RECIPES.forEach(function(r){
  multipliers[r.id] = 1;
  editedRecipes[r.id] = JSON.parse(JSON.stringify(r));
});
// Poi sovrascrive con quelli salvati (se esistono)
loadFromStorage();
// Assicura che ricette nuove aggiunte al codice siano presenti
BASE_RECIPES.forEach(function(r){
  if(!editedRecipes[r.id]) editedRecipes[r.id] = JSON.parse(JSON.stringify(r));
  if(!multipliers[r.id]) multipliers[r.id] = 1;
});

var tags = ['Tutte'];
BASE_RECIPES.forEach(function(r){ if(tags.indexOf(r.tag)===-1) tags.push(r.tag); });
var activeTag = 'Tutte';
var searchTerm = '';

// ── UTILS ──
function getRecipe(id){ return editedRecipes[id]; }

function fmtQty(qty, mult){
  if(qty === 0) return 'q.b.';
  var v = qty * mult;
  if(v === Math.floor(v)) return v + '';
  return parseFloat(v.toFixed(1)) + '';
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ── FILTRI ──
function buildFilters(){
  var row = document.getElementById('filterRow');
  row.innerHTML = tags.map(function(t){
    return '<button class="filter-btn'+(t===activeTag?' active':'')+'" onclick="setTag(\''+t+'\')">'+t+'</button>';
  }).join('');
}
function setTag(t){ activeTag=t; buildFilters(); renderList(); }
function filterRecipes(v){ searchTerm=v.toLowerCase(); renderList(); }
function getFiltered(){
  return BASE_RECIPES.filter(function(r){
    var mt = activeTag==='Tutte' || r.tag===activeTag;
    var ms = !searchTerm || r.title.toLowerCase().indexOf(searchTerm)!==-1 || r.tag.toLowerCase().indexOf(searchTerm)!==-1;
    return mt && ms;
  });
}

// ── RENDER INGREDIENTI EDITABILI ──
function renderIngTable(id){
  var r = getRecipe(id);
  var mult = multipliers[id] || 1;
  var rows = r.ingredienti.map(function(ing, idx){
    var displayQty = ing.qty === 0 ? '' : fmtQty(ing.qty, mult);
    var displayUnit = ing.unit === 'q.b.' ? 'q.b.' : ing.unit;
    return '<div class="ing-row" data-idx="'+idx+'">' +
      '<div class="ing-name-cell">' +
        '<input class="ing-name-input" type="text" value="'+escH(ing.nome)+'" placeholder="Ingrediente" ' +
          'onchange="updateIngName('+id+','+idx+',this.value)">' +
      '</div>' +
      '<div class="ing-qty-cell">' +
        '<input class="ing-qty-input" type="number" value="'+displayQty+'" placeholder="qty" min="0" step="any" ' +
          'onchange="updateIngQty('+id+','+idx+',this.value,'+mult+')">' +
        '<input class="ing-unit-input" type="text" value="'+escH(displayUnit)+'" placeholder="g" ' +
          'onchange="updateIngUnit('+id+','+idx+',this.value)">' +
      '</div>' +
      '<div class="ing-del-cell">' +
        '<button class="btn-del-ing" onclick="deleteIng('+id+','+idx+')" title="Rimuovi">✕</button>' +
      '</div>' +
    '</div>';
  }).join('');
  var table = document.getElementById('ing_'+id);
  if(table) table.innerHTML = rows;
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── MODIFICA INGREDIENTI ──
function updateIngName(id, idx, val){
  getRecipe(id).ingredienti[idx].nome = val;
  saveToStorage();
}
function updateIngQty(id, idx, val, mult){
  var r = getRecipe(id);
  var raw = parseFloat(val);
  if(isNaN(raw)) raw = 0;
  r.ingredienti[idx].qty = mult > 1 ? raw / mult : raw;
  if(r.ingredienti[idx].unit === 'q.b.' && raw > 0) r.ingredienti[idx].unit = 'g';
  saveToStorage();
}
function updateIngUnit(id, idx, val){
  var r = getRecipe(id);
  r.ingredienti[idx].unit = val || 'g';
  if(val === 'q.b.') r.ingredienti[idx].qty = 0;
  saveToStorage();
}
function deleteIng(id, idx){
  getRecipe(id).ingredienti.splice(idx, 1);
  saveToStorage();
  renderIngTable(id);
}
function addIng(id){
  getRecipe(id).ingredienti.push({nome:'',qty:0,unit:'g'});
  saveToStorage();
  renderIngTable(id);
  // focus sull'ultimo campo nome
  setTimeout(function(){
    var table = document.getElementById('ing_'+id);
    if(!table) return;
    var inputs = table.querySelectorAll('.ing-name-input');
    if(inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}
function resetRecipe(id){
  if(!confirm('Ripristinare la ricetta originale?')) return;
  editedRecipes[id] = JSON.parse(JSON.stringify(BASE_RECIPES.find(function(r){return r.id===id;})));
  multipliers[id] = 1;
  saveToStorage();
  var wasOpen = document.getElementById('rc_'+id) && document.getElementById('rc_'+id).classList.contains('open');
  renderList();
  if(wasOpen){ var c=document.getElementById('rc_'+id); if(c) c.classList.add('open'); }
}

// ── MOLTIPLICATORE ──
function changeMult(id, delta){
  var m = (multipliers[id]||1) + delta;
  if(m < 1) m = 1;
  multipliers[id] = m;
  saveToStorage();
  document.getElementById('mv_'+id).textContent = '×' + m;
  renderIngTable(id);
}

// ── SCREENSHOT WHATSAPP ──
function doScreenshot(id){
  var r = getRecipe(id);
  var mult = multipliers[id] || 1;

  var pc = document.createElement('div');
  pc.style.cssText = 'position:fixed;left:-9999px;top:0;width:420px;background:#FFFDF8;color:#1E1208;font-family:Georgia,serif;padding:28px 24px;';

  var ingRows = r.ingredienti.map(function(ing){
    var q = ing.unit==='q.b.' ? 'q.b.' : fmtQty(ing.qty, mult) + ' ' + ing.unit;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #E8DDD0;font-size:14px">' +
      '<span style="color:#2A1A0A">'+escH(ing.nome)+'</span>' +
      '<span style="color:#8B4A1C;font-weight:700;font-family:monospace">'+q+'</span>' +
    '</div>';
  }).join('');

  var istrHTML = '';
  r.istruzioni.split('\n').forEach(function(s){
    s = s.trim(); if(!s) return;
    var m = s.match(/^(\d+)\.\s*(.*)/);
    if(m) istrHTML += '<div style="display:flex;gap:10px;margin-bottom:9px;font-size:13px;line-height:1.65"><span style="color:#C4782A;font-weight:700;min-width:20px">'+m[1]+'.</span><span>'+m[2]+'</span></div>';
    else istrHTML += '<p style="font-size:13px;line-height:1.65;margin-bottom:9px">'+s+'</p>';
  });

  pc.innerHTML =
    // Header
    '<div style="background:#8B4A1C;margin:-28px -24px 24px;padding:22px 24px;display:flex;align-items:center;gap:14px">' +
      '<span style="font-size:38px">'+r.emoji+'</span>' +
      '<div>' +
        '<div style="font-family:Georgia,serif;font-size:22px;font-style:italic;color:#FFF8F0;font-weight:700">'+escH(r.title)+'</div>' +
        '<div style="font-size:10px;color:rgba(255,248,240,0.65);margin-top:4px;letter-spacing:1px;text-transform:uppercase">MATTEO LA SPADA · L\'ORSO MESSINA</div>' +
      '</div>' +
    '</div>' +
    // Badge moltiplicatore
    (mult>1 ? '<div style="background:#FEF3E2;border:1.5px solid #C4782A;border-radius:10px;padding:8px 14px;margin-bottom:16px;font-size:12px;color:#8B4A1C;font-family:monospace">✖'+mult+' — Dosi moltiplicate per '+mult+'</div>' : '') +
    // Ingredienti
    '<div style="font-size:10px;color:#7A6A58;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-family:monospace;font-weight:600">Ingredienti</div>' +
    ingRows +
    // Istruzioni
    '<div style="font-size:10px;color:#7A6A58;text-transform:uppercase;letter-spacing:1.5px;margin:18px 0 10px;font-family:monospace;font-weight:600">Istruzioni</div>' +
    istrHTML +
    // Footer
    '<div style="margin-top:20px;padding-top:14px;border-top:1px solid #E8DDD0;text-align:center;font-size:11px;color:#7A6A58;letter-spacing:1px">🐻 L\'ORSO MESSINA · #SEGUILORSO</div>';

  document.body.appendChild(pc);
  html2canvas(pc, {backgroundColor:'#FFFDF8', scale:2, useCORS:true, logging:false}).then(function(canvas){
    document.body.removeChild(pc);
    canvas.toBlob(function(blob){
      if(navigator.share && navigator.canShare && navigator.canShare({files:[new File([blob],'r.png',{type:'image/png'})]})){
        var file = new File([blob], 'ricetta_'+r.title.replace(/\s+/g,'_')+'.png', {type:'image/png'});
        navigator.share({title:r.title, text:'Ricetta: '+r.title+' — Matteo La Spada', files:[file]})
          .then(function(){ showToast('✅ Condiviso!'); })
          .catch(function(){ downloadImage(canvas, r.title); });
      } else { downloadImage(canvas, r.title); }
    }, 'image/png');
  });
}

function downloadImage(canvas, title){
  var link = document.createElement('a');
  link.download = 'ricetta_'+title.replace(/\s+/g,'_')+'.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  showToast('📥 Immagine salvata!');
}

// ── RENDER LISTA ──
function renderList(){
  var filtered = getFiltered();
  document.getElementById('countBar').textContent = filtered.length + ' ricette';
  var list = document.getElementById('recipeList');
  list.innerHTML = '';

  filtered.forEach(function(base){
    var r = getRecipe(base.id);
    var mult = multipliers[base.id] || 1;
    var card = document.createElement('div');
    card.className = 'recipe-card';
    card.id = 'rc_' + base.id;

    var istrHTML = '';
    r.istruzioni.split('\n').forEach(function(s){
      s = s.trim(); if(!s) return;
      var m = s.match(/^(\d+)\.\s*(.*)/);
      if(m) istrHTML += '<div class="istr-step"><span class="step-num">'+m[1]+'.</span><span>'+m[2]+'</span></div>';
      else istrHTML += '<p class="istr-text">'+s+'</p>';
    });

    card.innerHTML =
      '<div class="recipe-header" onclick="toggleRecipe('+base.id+')">' +
        '<div class="recipe-emoji">'+r.emoji+'</div>' +
        '<div class="recipe-info">' +
          '<div class="recipe-title">'+escH(r.title)+'</div>' +
          '<div class="recipe-meta">'+r.ingredienti.length+' ingredienti</div>' +
          '<span class="recipe-tag">'+r.tag+'</span>' +
        '</div>' +
        '<span class="recipe-arrow">▼</span>' +
      '</div>' +
      '<div class="recipe-body">' +
        // Moltiplicatore
        '<div class="mult-bar">' +
          '<span class="mult-label">Moltiplica dosi</span>' +
          '<button class="mult-btn" onclick="changeMult('+base.id+',-1)">−</button>' +
          '<span class="mult-value" id="mv_'+base.id+'">×'+mult+'</span>' +
          '<button class="mult-btn" onclick="changeMult('+base.id+',1)">+</button>' +
        '</div>' +
        // Ingredienti
        '<div class="section-label">' +
          '<span>🧾 Ingredienti</span>' +
          '<button class="btn-add-ing" onclick="addIng('+base.id+')">+ Aggiungi</button>' +
        '</div>' +
        '<div id="ing_'+base.id+'"></div>' +
        // Istruzioni
        '<div class="istr-block">' +
          '<div class="istr-title">📋 Istruzioni — modifica qui sotto</div>' +
          '<textarea class="istr-textarea" rows="5" onchange="editedRecipes['+base.id+'].istruzioni=this.value;saveToStorage()">'+escH(r.istruzioni)+'</textarea>' +
        '</div>' +
        // Azioni
        '<div class="share-bar">' +
          '<button class="btn-wa" onclick="doScreenshot('+base.id+')">📲 Condividi su WhatsApp</button>' +
          '<button class="btn-reset" onclick="resetRecipe('+base.id+')" title="Ripristina originale">↺</button>' +
        '</div>' +
      '</div>';

    list.appendChild(card);
    renderIngTable(base.id);
  });
}

function toggleRecipe(id){
  var card = document.getElementById('rc_'+id);
  if(card) card.classList.toggle('open');
}

buildFilters();
renderList();
</script>
