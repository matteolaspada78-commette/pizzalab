<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Ricette MLS">
<link rel="manifest" href="/manifest.json">
<title>Ricettario — Matteo La Spada</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#faf8f3;--card:#fff;--border:#e8e0d0;
  --gold:#c9922a;--gold-light:#f5e6c8;--gold-dark:#a07420;
  --text:#1a1410;--muted:#8a7a6a;--red:#c0392b;
  --green:#2d7a4f;--tag:#f0e8d8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}

/* HEADER */
.header{background:var(--card);border-bottom:2px solid var(--gold);padding:16px 20px 14px;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
.brand-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold-dark)}
.brand-tag{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.search-box{position:relative}
.search-input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;background:var(--bg);color:var(--text);outline:none}
.search-input:focus{border-color:var(--gold)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}

/* CATEGORIE */
.cat-scroll{overflow-x:auto;scrollbar-width:none;padding:12px 16px 4px}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-tabs{display:flex;gap:8px;width:max-content}
.cat-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.cat-tab.active{background:var(--gold);border-color:var(--gold);color:#fff}

/* LISTA RICETTE */
.ricette-list{padding:12px 16px}
.section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;padding-left:2px}

.ricetta-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all 0.15s;animation:fadeIn 0.2s ease}
.ricetta-card:active{transform:scale(0.98)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ricetta-header{padding:14px 16px;display:flex;align-items:center;gap:12px}
.ricetta-emoji{font-size:28px;width:44px;text-align:center;flex-shrink:0}
.ricetta-info{flex:1}
.ricetta-nome{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);margin-bottom:3px}
.ricetta-meta{font-size:12px;color:var(--muted)}
.ricetta-arrow{color:var(--muted);font-size:18px}
.ricetta-tag{display:inline-block;background:var(--gold-light);color:var(--gold-dark);font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}

/* DETTAGLIO RICETTA */
.dettaglio{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;padding-bottom:40px}
.dettaglio.open{display:block;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

.det-header{background:var(--card);border-bottom:2px solid var(--gold);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.btn-back{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gold-dark);padding:4px;line-height:1}
.det-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);flex:1}
.det-emoji{font-size:24px}

.det-body{padding:20px 16px}

/* MOLTIPLICATORE */
.moltiplicatore{background:var(--gold-light);border:1px solid var(--gold);border-radius:14px;padding:16px;margin-bottom:20px}
.molt-label{font-size:11px;color:var(--gold-dark);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px}
.molt-controls{display:flex;align-items:center;gap:12px}
.molt-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--gold);color:#fff;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s;flex-shrink:0}
.molt-btn:active{opacity:0.7}
.molt-input{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--gold-dark);background:transparent;border:none;outline:none}
.molt-info{font-size:12px;color:var(--gold-dark);text-align:right;margin-top:8px}

/* INGREDIENTI */
.ingredienti-section{margin-bottom:20px}
.ing-title{font-size:13px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ing-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-nome{flex:1;font-size:15px;color:var(--text)}
.ing-qta{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--gold-dark);text-align:right;min-width:80px}

/* ISTRUZIONI */
.istr-title{font-size:13px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.istr-text{font-size:15px;color:var(--text);line-height:1.7;white-space:pre-line}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* BTN AGGIUNGI RICETTA */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--gold);border:none;font-size:26px;color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(201,146,42,0.4);z-index:150;display:flex;align-items:center;justify-content:center;transition:transform 0.15s}
.fab:active{transform:scale(0.92)}

/* MODAL NUOVA RICETTA */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:flex-end}
.modal.open{display:flex;animation:fadeIn 0.2s}
.modal-body{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:24px 20px 40px}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;background:var(--card);color:var(--text);outline:none}
.form-input:focus{border-color:var(--gold)}
textarea.form-input{min-height:100px;resize:vertical}
.ing-add-row{display:flex;gap:8px;margin-bottom:8px}
.ing-add-row .form-input{flex:1}
.ing-add-row .form-input.qta{width:80px;flex:none}
.ing-add-row .form-input.unit{width:50px;flex:none}
.btn-add-ing{padding:11px 14px;border:1px dashed var(--gold);border-radius:10px;background:var(--gold-light);color:var(--gold-dark);font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-bottom:14px}
.btn-remove-ing{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.btn-salva{width:100%;padding:15px;border-radius:12px;border:none;background:var(--gold);color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-salva:active{opacity:0.85}
.btn-chiudi{width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:15px;cursor:pointer;margin-top:8px}

.cat-select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;background:var(--card);color:var(--text);outline:none;-webkit-appearance:none}

.share-bar{display:flex;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.btn-share{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 10px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.15s}
.btn-share:active{opacity:0.75}
.btn-wa{background:#25D366;color:#fff}
.btn-pdf{background:var(--gold);color:#fff}
@media print{.det-header,.moltiplicatore,.share-bar,.fab,.toolbar,nav{display:none!important}.dettaglio{position:static!important;overflow:visible!important}.det-body{padding:0}}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <span class="brand-name">Matteo La Spada</span>
    <span class="brand-tag">#seguilorso 🐻</span>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Cerca ricetta...">
  </div>
</div>

<div class="cat-scroll">
  <div class="cat-tabs" id="catTabs"></div>
</div>

<div class="ricette-list">
  <div class="section-label" id="countLabel"></div>
  <div id="listaRicette"></div>
</div>

<!-- DETTAGLIO -->
<div class="dettaglio" id="dettaglio">
  <div class="det-header">
    <button class="btn-back" onclick="chiudiDettaglio()">←</button>
    <div class="det-title" id="detTitolo"></div>
    <span class="det-emoji" id="detEmoji"></span>
  </div>
  <div class="det-body">
    <div class="moltiplicatore">
      <div class="molt-label">⚖️ Calcola per quante porzioni</div>
      <div class="molt-controls">
        <button class="molt-btn" onclick="cambiaPorte(-1)">−</button>
        <input type="number" class="molt-input" id="porzioniInput" value="1" min="0.1" step="0.5" inputmode="decimal" onchange="aggiornaDosi()">
        <button class="molt-btn" onclick="cambiaPorte(1)">+</button>
      </div>
      <div class="molt-info" id="moltInfo">Ricetta base: 1 porzione</div>
    </div>
    <div class="ingredienti-section">
      <div class="ing-title">🧂 Ingredienti</div>
      <div id="detIngredienti"></div>
    </div>
    <div>
      <div class="istr-title">👨‍🍳 Procedimento</div>
      <div class="istr-text" id="detIstruzioni"></div>
    </div>
    <div class="share-bar">
      <button class="btn-share btn-wa" onclick="condividiWhatsApp()">📲 WhatsApp</button>
      <button class="btn-share btn-pdf" onclick="stampaPDF()">🖨️ Stampa / PDF</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="apriModal()" title="Aggiungi ricetta">+</button>

<!-- MODAL NUOVA RICETTA -->
<div class="modal" id="modal">
  <div class="modal-body">
    <div class="modal-title">📝 Nuova Ricetta</div>
    <div class="form-group">
      <label class="form-label">Nome ricetta</label>
      <input type="text" class="form-input" id="newNome" placeholder="es. Crema di pecorino">
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select class="cat-select" id="newCategoria"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Emoji (opzionale)</label>
      <input type="text" class="form-input" id="newEmoji" placeholder="🍕" maxlength="2">
    </div>
    <div class="form-group">
      <label class="form-label">Porzioni base (ricetta per N)</label>
      <input type="number" class="form-input" id="newPorte" placeholder="1" value="1" min="0.1" step="0.5" inputmode="decimal">
    </div>
    <div class="form-group">
      <label class="form-label">Ingredienti</label>
      <div id="ingList"></div>
      <button class="btn-add-ing" onclick="addIngRow()">+ Aggiungi ingrediente</button>
    </div>
    <div class="form-group">
      <label class="form-label">Procedimento</label>
      <textarea class="form-input" id="newIstruzioni" placeholder="Descrivi il procedimento..."></textarea>
    </div>
    <button class="btn-salva" onclick="salvaRicetta()">Salva Ricetta</button>
    <button class="btn-chiudi" onclick="chiudiModal()">Annulla</button>
  </div>
</div>

<script>
// ======= DATI RICETTE =======
const RICETTE_DEFAULT = [
  {
    id:1, nome:'Crema di Pecorino', emoji:'🧀', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Latte',qta:100,unit:'g'},{nome:'Panna',qta:100,unit:'g'},{nome:'Pecorino',qta:100,unit:'g'}],
    istruzioni:'In una casseruola su piastra induzione portare a 80°C latte e panna. Una volta raggiunta la temperatura aggiungere il pecorino in 3 volte girando con una frusta. Assicurarsi che non si formino grumi, spegnere e lasciare raffreddare a temperatura ambiente. Mettere nel sacchetto sottovuoto adatto per cucinare e pastorizzare a 85°C per 15 minuti.'
  },
  {
    id:2, nome:'Crema di Grana', emoji:'🧀', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Latte',qta:100,unit:'g'},{nome:'Panna',qta:100,unit:'g'},{nome:'Grana grattugiato',qta:100,unit:'g'}],
    istruzioni:'In una casseruola su piastra induzione portare a 80°C latte e panna. Una volta raggiunta la temperatura aggiungere il grana grattugiato il più fine possibile in 3 volte girando con una frusta. Assicurarsi che non si formino grumi, spegnere e lasciare raffreddare a temperatura ambiente. Mettere nel sacchetto sottovuoto adatto per cucinare e pastorizzare a 85°C per 15 minuti.'
  },
  {
    id:3, nome:'Crema di Zucca', emoji:'🎃', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Zucca',qta:100,unit:'g'},{nome:'Rosmarino',qta:3,unit:'g'},{nome:'Timo',qta:3,unit:'g'},{nome:'Sale',qta:1,unit:'g'},{nome:'Pepe di Sichuan',qta:0.1,unit:'g'}],
    istruzioni:'Tagliare la zucca con la buccia in quattro o otto parti (dipende dalle dimensioni). Aggiungere gli ingredienti e infornare a 180°C con ventilazione per 35 minuti.'
  },
  {
    id:4, nome:'Crema di Cipolla', emoji:'🧅', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Cipolla',qta:100,unit:'g'},{nome:'Sale',qta:10,unit:'g'},{nome:'Olio extra vergine',qta:10,unit:'g'}],
    istruzioni:'Tagliare a metà la cipolla e mettere sale e olio. Infornare a 170°C per 40 minuti. Raffreddare, pulire la cipolla dal primo strato e frullare.'
  },
  {
    id:5, nome:'Salsa Verde', emoji:'🌿', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Prezzemolo',qta:100,unit:'g'},{nome:'Acciughe',qta:10,unit:'g'},{nome:'Capperi',qta:2,unit:'g'},{nome:'Aceto bianco',qta:40,unit:'g'},{nome:'Olio extra vergine d\'oliva',qta:50,unit:'g'},{nome:'Pane per tramezzini',qta:40,unit:'g'}],
    istruzioni:'Vaporizzare il prezzemolo e abbattere in negativo fino a portarlo a 0°C. Una volta abbattuto, mettere nel cutter insieme a tutti gli ingredienti della ricetta e frullare fino al raggiungimento di un composto omogeneo.'
  },
  {
    id:6, nome:'Datterino Semi Secco', emoji:'🍅', categoria:'Verdure', porteBase:1,
    ingredienti:[{nome:'Datterino',qta:100,unit:'g'},{nome:'Olio extra vergine d\'oliva',qta:4,unit:'g'},{nome:'Sale bilanciato',qta:2,unit:'g'},{nome:'Timo',qta:1,unit:'g'},{nome:'Aglio',qta:1,unit:'g'}],
    istruzioni:'Tagliare a metà il pomodoro, adagiare sulla teglia e aggiungere gli ingredienti. Cucinare a 110°C ventola 2, valvola aperta per 70-100 minuti (dipende dalla consistenza desiderata e dalla pezzatura). Una volta cotto, fare raffreddare e mettere nei sacchetti sottovuoto. Per ogni kg di prodotto aggiungere 20g olio EVO, 20g olio di semi girasole e una foglia di basilico spezzata a mano. Chiudere sottovuoto al 99% e cucinare a vapore 85°C per 15 minuti.'
  },
  {
    id:7, nome:'Crema di Patate', emoji:'🥔', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Patate pasta gialla',qta:1000,unit:'g'},{nome:'Acqua',qta:1500,unit:'g'},{nome:'Olio extra vergine d\'oliva',qta:100,unit:'g'},{nome:'Porro',qta:20,unit:'g'},{nome:'Carote',qta:30,unit:'g'},{nome:'Sale',qta:10,unit:'g'},{nome:'Rosmarino',qta:10,unit:'g'},{nome:'Timo',qta:10,unit:'g'}],
    istruzioni:'Pelare le patate e tagliarle a cubetti. Mettere in pentola con il resto degli ingredienti pelati. Una volta a ebollizione, cucinare per 15 minuti. Raffreddare e mettere nel cutter prima le sole patate, poi una volta frullate aggiungere tutto il brodo vegetale insieme a carota, porro ed erbe aromatiche.'
  },
  {
    id:8, nome:'Salsa Tzatziki', emoji:'🥒', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Yogurt greco',qta:100,unit:'g'},{nome:'Cetrioli',qta:50,unit:'g'},{nome:'Olio extra vergine d\'oliva',qta:5,unit:'g'},{nome:'Aceto bianco',qta:2.5,unit:'g'},{nome:'Sale',qta:2.5,unit:'g'},{nome:'Prezzemolo',qta:2.5,unit:'g'},{nome:'Alpigiana (opzionale)',qta:50,unit:'g'}],
    istruzioni:'Lavare i cetrioli e grattugiare. Fare colare l\'acqua di vegetazione per almeno 1 ora. Mescolare tutto e mettere in un frullatore tranne lo yogurt, che verrà inserito solo quando tutti gli ingredienti sono stati frullati — senza che tocchi la lama del cutter — fino ad ottenere la consistenza voluta.'
  },
  {
    id:9, nome:'Pesto di Zucchine', emoji:'🥦', categoria:'Creme & Salse', porteBase:1,
    ingredienti:[{nome:'Zucchine',qta:100,unit:'g'},{nome:'Patate',qta:10,unit:'g'},{nome:'Olio extra vergine d\'oliva',qta:13,unit:'g'},{nome:'Aglio',qta:1,unit:'g'},{nome:'Sale bilanciato verdure',qta:2,unit:'g'},{nome:'Grana padano',qta:10,unit:'g'},{nome:'Basilico',qta:1.5,unit:'g'},{nome:'Mandorle',qta:10,unit:'g'}],
    istruzioni:'Lavare e tagliare a rondelle le zucchine. Pelare le patate e tagliarle a cubetti molto sottili. Disporre su una teglia, aggiungere olio, aglio e sale bilanciato per verdure. Cucinare in forno a 180°C per 18-25 minuti. Una volta finita la cottura, lasciare raffreddare e frullare nel cutter. Aggiungere grana padano, basilico e mandorle fino a ottenere un composto liscio e omogeneo.'
  },
  {
    id:10, nome:'Crema di Cavolo Rosso', emoji:'🫐', categoria:'Verdure', porteBase:1,
    ingredienti:[{nome:'Cavolo rosso',qta:100,unit:'g'},{nome:'Olio semi girasole',qta:20,unit:'g'},{nome:'Acqua',qta:20,unit:'g'},{nome:'Sale bilanciato per verdure',qta:2,unit:'g'}],
    istruzioni:'Lavare e tagliare in 4 il cavolo. Mettere nelle teglie, vapore a 100°C solo vapore per 19 minuti. Una volta finita la cottura, mettere nel cutter con gli ingredienti della ricetta. Abbattere il prodotto e pastorizzare.'
  },
  {
    id:11, nome:'Guancia di Maiale Stracotta', emoji:'🐷', categoria:'Carni', porteBase:10,
    ingredienti:[{nome:'Carrialda di suino',qta:1000,unit:'g'},{nome:'Olio extravergine d\'oliva',qta:20,unit:'g'},{nome:'Sale bilanciato per carni rosse',qta:20,unit:'g'},{nome:'Alloro',qta:5,unit:'g'},{nome:'Cipolla maturata',qta:20,unit:'g'},{nome:'Timo',qta:10,unit:'g'},{nome:'Pepe nero in grani',qta:2,unit:'g'}],
    istruzioni:'Massaggiare la carrialda di suino con olio extravergine d\'oliva e sale bilanciato per carne rossa. Grigliare su unità Rational — grigliata 4° colorazione per 4 minuti. Una volta raffreddato, mettere nei sacchetti sottovuoto con sale bilanciato (63% sale/37% zucchero di canna) 9g al kg, foglie di alloro, rosmarino, timo, olio EVO e cipolla maturata. Cucinare per 5 ore con solo vapore a 93°C.'
  },
  {
    id:12, nome:'Crema di Scarola', emoji:'🥬', categoria:'Verdure', porteBase:1,

  }
];

const CATEGORIE_DEFAULT = ['Tutte','Creme & Salse','Verdure','Carni','Pesce','Uova','Salse Pomodoro','Sale Bilanciato','Impasti & Base','Altro','Dolci'];

// ======= STATO =======
let ricette = JSON.parse(localStorage.getItem('ricettario_mls') || 'null') || RICETTE_DEFAULT;
let catSel = 'Tutte';
let searchQ = '';
let ricettaAperta = null;
let porzioni = 1;

function salvaLocale(){localStorage.setItem('ricettario_mls',JSON.stringify(ricette));}

// ======= CATEGORIE TABS =======
function buildCatTabs(){
  const cats = ['Tutte',...new Set(ricette.map(r=>r.categoria))];
  const el = document.getElementById('catTabs');
  el.innerHTML = cats.map(c=>`<div class="cat-tab${c===catSel?' active':''}" onclick="selCat('${c}')">${c}</div>`).join('');
}
function selCat(c){catSel=c;buildCatTabs();renderLista();}

// ======= LISTA =======
function renderLista(){
  let lista = ricette.filter(r=>{
    const matchCat = catSel==='Tutte'||r.categoria===catSel;
    const matchSearch = !searchQ||r.nome.toLowerCase().includes(searchQ.toLowerCase());
    return matchCat&&matchSearch;
  });
  document.getElementById('countLabel').textContent = lista.length+' ricett'+(lista.length===1?'a':'e');
  const el = document.getElementById('listaRicette');
  if(lista.length===0){
    el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Nessuna ricetta trovata</div>';
    return;
  }
  el.innerHTML = lista.map(r=>`
    <div class="ricetta-card" onclick="apriRicetta(${r.id})">
      <div class="ricetta-header">
        <div class="ricetta-emoji">${r.emoji||'🍽️'}</div>
        <div class="ricetta-info">
          <div class="ricetta-nome">${r.nome}</div>
          <div class="ricetta-meta">${r.ingredienti.length} ingredienti · base ${r.porteBase} pz</div>
          <span class="ricetta-tag">${r.categoria}</span>
        </div>
        <span class="ricetta-arrow">›</span>
      </div>
    </div>
  `).join('');
}

// ======= DETTAGLIO =======
function apriRicetta(id){
  ricettaAperta = ricette.find(r=>r.id===id);
  porzioni = ricettaAperta.porteBase;
  document.getElementById('porzioniInput').value = porzioni;
  document.getElementById('detTitolo').textContent = ricettaAperta.nome;
  document.getElementById('detEmoji').textContent = ricettaAperta.emoji||'🍽️';
  aggiornaDosi();
  document.getElementById('dettaglio').classList.add('open');
  document.body.style.overflow='hidden';
}

function chiudiDettaglio(){
  document.getElementById('dettaglio').classList.remove('open');
  document.body.style.overflow='';
  ricettaAperta=null;
}

function cambiaPorte(delta){
  const inp=document.getElementById('porzioniInput');
  let v=parseFloat(inp.value)||1;
  v=Math.max(0.1,v+delta);
  inp.value=v;
  aggiornaDosi();
}

function aggiornaDosi(){
  if(!ricettaAperta)return;
  porzioni=parseFloat(document.getElementById('porzioniInput').value)||1;
  const mult=porzioni/ricettaAperta.porteBase;
  document.getElementById('moltInfo').textContent=`Ricetta base: ${ricettaAperta.porteBase} pz · Moltiplicatore: ×${mult.toFixed(2)}`;

  const ingEl=document.getElementById('detIngredienti');
  ingEl.innerHTML=ricettaAperta.ingredienti.map(ing=>{
    let qtaCalc=ing.qta*mult;
    let qtaStr='';
    if(ing.unit==='q.b.'||ing.qta===0){
      qtaStr='q.b.';
    } else if(qtaCalc<1){
      qtaStr=qtaCalc.toFixed(2)+' '+ing.unit;
    } else if(qtaCalc%1===0){
      qtaStr=qtaCalc.toFixed(0)+' '+ing.unit;
    } else {
      qtaStr=qtaCalc.toFixed(1)+' '+ing.unit;
    }
    return `<div class="ing-row"><span class="ing-nome">${ing.nome}</span><span class="ing-qta">${qtaStr}</span></div>`;
  }).join('');

  document.getElementById('detIstruzioni').textContent=ricettaAperta.istruzioni;
}

// ======= MODAL NUOVA RICETTA =======
let ingRows=[];
function apriModal(){
  ingRows=[];
  document.getElementById('newNome').value='';
  document.getElementById('newEmoji').value='';
  document.getElementById('newPorte').value='1';
  document.getElementById('newIstruzioni').value='';
  const cats=[...new Set(ricette.map(r=>r.categoria)),'Altro'];
  document.getElementById('newCategoria').innerHTML=cats.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('ingList').innerHTML='';
  addIngRow();addIngRow();
  document.getElementById('modal').classList.add('open');
}

function chiudiModal(){document.getElementById('modal').classList.remove('open');}

function addIngRow(){
  const div=document.createElement('div');
  div.className='ing-add-row';
  const idx=ingRows.length;
  div.innerHTML=`
    <input type="text" class="form-input" placeholder="Ingrediente" id="ing_nome_${idx}">
    <input type="number" class="form-input qta" placeholder="100" id="ing_qta_${idx}" inputmode="decimal">
    <input type="text" class="form-input unit" placeholder="g" id="ing_unit_${idx}" value="g">
    <button class="btn-remove-ing" onclick="this.parentElement.remove()">✕</button>
  `;
  ingRows.push(idx);
  document.getElementById('ingList').appendChild(div);
}

function salvaRicetta(){
  const nome=document.getElementById('newNome').value.trim();
  if(!nome){alert('Inserisci il nome della ricetta');return;}
  const ings=[];
  document.getElementById('ingList').querySelectorAll('.ing-add-row').forEach(row=>{
    const n=row.querySelector('[placeholder="Ingrediente"]').value.trim();
    const q=parseFloat(row.querySelector('.qta').value)||0;
    const u=row.querySelector('.unit').value.trim()||'g';
    if(n)ings.push({nome:n,qta:q,unit:u});
  });
  if(ings.length===0){alert('Aggiungi almeno un ingrediente');return;}
  const nuova={
    id:Date.now(),
    nome,
    emoji:document.getElementById('newEmoji').value||'🍽️',
    categoria:document.getElementById('newCategoria').value,
    porteBase:parseFloat(document.getElementById('newPorte').value)||1,
    ingredienti:ings,
    istruzioni:document.getElementById('newIstruzioni').value.trim()
  };
  ricette.push(nuova);
  salvaLocale();
  chiudiModal();
  buildCatTabs();
  renderLista();
}

// ======= SEARCH =======
document.getElementById('searchInput').addEventListener('input',function(){
  searchQ=this.value;
  renderLista();
});

// ======= INIT =======
buildCatTabs();
renderLista();
</script>

<script>
if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e));
  });
}

function condividiWhatsApp(){
  if(!ricettaAperta) return;
  const r = ricettaAperta;
  const port = parseFloat(document.getElementById('porzioniInput').value) || r.porteBase;
  const mult = port / r.porteBase;
  let testo = r.emoji + ' *' + r.nome + '*\n';
  testo += '━━━━━━━━━━━━━━━\n';
  testo += '🧂 *Ingredienti* (x' + port + ' porzioni):\n';
  r.ingredienti.forEach(function(ing){
    const q = Math.round(ing.qta * mult * 10) / 10;
    testo += '• ' + ing.nome + ': ' + q + (ing.unit ? ' ' + ing.unit : '') + '\n';
  });
  testo += '\n👨‍🍳 *Procedimento:*\n' + r.istruzioni;
  testo += '\n\n— Ricettario L\'Orso 🍕';
  const url = 'https://wa.me/?text=' + encodeURIComponent(testo);
  window.open(url, '_blank');
}

function stampaPDF(){
  if(!ricettaAperta) return;
  const r = ricettaAperta;
  const port = parseFloat(document.getElementById('porzioniInput').value) || r.porteBase;
  const mult = port / r.porteBase;

  let righeIngredienti = r.ingredienti.map(function(ing){
    const q = Math.round(ing.qta * mult * 10) / 10;
    return '<tr><td>' + ing.nome + '</td><td><strong>' + q + (ing.unit ? ' ' + ing.unit : '') + '</strong></td></tr>';
  }).join('');

  const istrHtml = r.istruzioni.replace(/\n/g,'<br>');

  const html = '<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>' + r.nome + '</title><style>' +
    'body{font-family:Georgia,serif;max-width:700px;margin:40px auto;color:#1a1a1a;padding:0 20px}' +
    'h1{font-size:26px;margin-bottom:4px}' +
    '.sub{color:#888;font-size:13px;margin-bottom:28px}' +
    'h2{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:#b8860b;border-bottom:1px solid #e0c97f;padding-bottom:6px;margin-top:28px}' +
    'table{width:100%;border-collapse:collapse;margin-top:10px}' +
    'td{padding:7px 6px;border-bottom:1px solid #f0e8d0;font-size:14px}' +
    'td:last-child{text-align:right;white-space:nowrap}' +
    '.proc{font-size:14px;line-height:1.7;margin-top:10px}' +
    '.firma{margin-top:40px;padding-top:16px;border-top:1px solid #ccc;text-align:right;font-size:12px;color:#666;font-style:italic}' +
    '@media print{body{margin:20px}}' +
    '</style></head><body>' +
    '<div style="font-size:32px;margin-bottom:8px">' + r.emoji + '</div>' +
    '<h1>' + r.nome + '</h1>' +
    '<div class="sub">Porzioni: ' + port + ' &nbsp;|&nbsp; Categoria: ' + r.categoria + '</div>' +
    '<h2>Ingredienti</h2>' +
    '<table>' + righeIngredienti + '</table>' +
    '<h2>Procedimento</h2>' +
    '<div class="proc">' + istrHtml + '</div>' +
    '<div class="firma">Ricetta di <strong>Matteo La Spada</strong> — L\'Orso Messina 🍕</div>' +
    '</body></html>';

  const w = window.open('','_blank','width=800,height=900');
  w.document.write(html);
  w.document.close();
  w.onload = function(){ w.print(); };
}
</script>
