<style>

    --accent:#c8860a; --accent2:#e8a020; --text:#2a2018;
    --muted:#888; --green:#3a7a50; --tag:#f5ede0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

  header{background:var(--surface);border-bottom:2px solid var(--border);padding:18px 16px 14px;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--accent);margin-bottom:12px;}
  .logo span{font-size:13px;color:var(--muted);font-style:normal;display:block;margin-top:2px;}

  .search-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;width:100%;font-family:'DM Mono',monospace;font-size:14px;color:var(--text);outline:none;}
  .search-box:focus{border-color:var(--accent);}

  .filter-row{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:2px;}
  .filter-btn{background:var(--tag);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .count-bar{font-size:10px;color:var(--muted);padding:10px 16px 0;}

  .recipe-list{padding:12px;display:flex;flex-direction:column;gap:10px;}

  .recipe-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .recipe-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
  .recipe-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--text);}
  .recipe-meta{font-size:10px;color:var(--muted);margin-top:3px;}
  .recipe-tag{font-size:9px;background:var(--tag);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--accent);white-space:nowrap;margin-left:8px;}
  .arrow{color:var(--muted);font-size:11px;transition:transform 0.2s;}
  .recipe-card.open .arrow{transform:rotate(180deg);}

  .recipe-body{display:none;border-top:1px solid var(--border);}
  .recipe-card.open .recipe-body{display:block;}

  /* Moltiplicatore */
  .mult-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--bg);border-bottom:1px solid var(--border);}
  .mult-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .mult-btn{background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--accent);display:flex;align-items:center;justify-content:center;}
  .mult-value{font-size:18px;font-weight:500;color:var(--accent);min-width:32px;text-align:center;}
  .mult-hint{font-size:10px;color:var(--muted);margin-left:auto;}

  /* Ingredienti */
  .section-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:12px 16px 6px;}
  .ing-table{width:100%;border-collapse:collapse;}
  .ing-row{border-bottom:1px solid var(--border);}
  .ing-row:last-child{border-bottom:none;}
  .ing-name{padding:9px 16px;font-size:13px;color:var(--text);}
  .ing-qty{padding:9px 16px;font-size:13px;color:var(--accent);font-weight:500;text-align:right;white-space:nowrap;}

  /* Istruzioni */
  .istr-block{padding:14px 16px;border-top:1px solid var(--border);}
  .istr-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .istr-text{font-size:13px;line-height:1.7;color:var(--text);}
  .istr-step{display:flex;gap:10px;margin-bottom:8px;}
  .step-num{color:var(--accent);font-weight:500;min-width:18px;}
</style>
</head>

var tags = ['Tutte'];
recipes.forEach(function(r){ if(tags.indexOf(r.tag)===-1) tags.push(r.tag); });

var activeTag = 'Tutte';
var searchTerm = '';
var multipliers = {};
recipes.forEach(function(r){ multipliers[r.id] = 1; });

function buildFilters(){
  var row = document.getElementById('filterRow');
  row.innerHTML = tags.map(function(t){
    return '<button class="filter-btn'+(t===activeTag?' active':'')+'" onclick="setTag(\''+t+'\')">'+t+'</button>';
  }).join('');
}

function setTag(t){ activeTag=t; buildFilters(); renderList(); }

function filterRecipes(val){ searchTerm=val.toLowerCase(); renderList(); }

function getFiltered(){
  return recipes.filter(function(r){
    var matchTag = activeTag==='Tutte' || r.tag===activeTag;
    var matchSearch = !searchTerm || r.title.toLowerCase().indexOf(searchTerm)!==-1 || r.tag.toLowerCase().indexOf(searchTerm)!==-1;
    return matchTag && matchSearch;
  });
}

function fmtQty(qty, mult){
  var v = qty * mult;
  if(v===0) return 'q.b.';
  if(v === Math.floor(v)) return v.toString() + 'g';
  return v.toFixed(1).replace('.0','') + 'g';
}

function renderList(){
  var filtered = getFiltered();
  document.getElementById('countBar').textContent = filtered.length + ' ricette';
  var list = document.getElementById('recipeList');
  list.innerHTML = '';
  filtered.forEach(function(r){
    var mult = multipliers[r.id] || 1;
    var card = document.createElement('div');
    card.className = 'recipe-card';
    card.id = 'rc_'+r.id;

    var ingHTML = r.ingredienti.map(function(ing){
      var qtyStr = ing.unit==='q.b.' ? 'q.b.' : fmtQty(ing.qty, mult);
      return '<tr class="ing-row"><td class="ing-name">'+ing.nome+'</td><td class="ing-qty">'+qtyStr+'</td></tr>';
    }).join('');

    // istruzioni con step numerati
    var istrHTML = '';
    var steps = r.istruzioni.split('\n');
    steps.forEach(function(s){
      s = s.trim();
      if(!s) return;
      var match = s.match(/^(\d+)\.\s*(.*)/);
      if(match){
        istrHTML += '<div class="istr-step"><span class="step-num">'+match[1]+'.</span><span>'+match[2]+'</span></div>';
      } else {
        istrHTML += '<p class="istr-text" style="margin-bottom:8px">'+s+'</p>';
      }
    });

    card.innerHTML =
      '<div class="recipe-header" onclick="toggleRecipe('+r.id+')">'+
        '<div>'+
          '<div class="recipe-title">'+r.title+'</div>'+
          '<div class="recipe-meta">'+r.ingredienti.length+' ingredienti</div>'+
        '</div>'+
        '<div style="display:flex;align-items:center">'+
          '<span class="recipe-tag">'+r.tag+'</span>'+
          '<span class="arrow" style="margin-left:10px">▼</span>'+
        '</div>'+
      '</div>'+
      '<div class="recipe-body">'+
        '<div class="mult-bar">'+
          '<span class="mult-label">Porzioni base:</span>'+
          '<button class="mult-btn" onclick="changeMult('+r.id+',-1)">−</button>'+
          '<span class="mult-value" id="mv_'+r.id+'">×'+mult+'</span>'+
          '<button class="mult-btn" onclick="changeMult('+r.id+',1)">+</button>'+
          '<span class="mult-hint">Ricetta per '+r.porzione+' pz</span>'+
        '</div>'+
        '<div class="section-label">Ingredienti</div>'+
        '<table class="ing-table" id="ing_'+r.id+'">'+ingHTML+'</table>'+
        '<div class="istr-block">'+
          '<div class="istr-title">Istruzioni</div>'+
          istrHTML+
        '</div>'+
      '</div>';

    list.appendChild(card);
  });
}

function toggleRecipe(id){
  var card = document.getElementById('rc_'+id);
  if(card) card.classList.toggle('open');
}

function changeMult(id, delta){
  var m = (multipliers[id]||1) + delta;
  if(m < 1) m = 1;
  multipliers[id] = m;
  document.getElementById('mv_'+id).textContent = '×'+m;
  // aggiorna ingredienti
  var r = recipes.find(function(x){return x.id===id;});
  var table = document.getElementById('ing_'+id);
  if(!r||!table) return;
  var rows = table.querySelectorAll('.ing-row');
  r.ingredienti.forEach(function(ing, i){
    if(rows[i]){
      var qtyStr = ing.unit==='q.b.' ? 'q.b.' : fmtQty(ing.qty, m);
      rows[i].querySelector('.ing-qty').textContent = qtyStr;
    }
  });
}

buildFilters();
renderList();
</script>
</body>
</html>
