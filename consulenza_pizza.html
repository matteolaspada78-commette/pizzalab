<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Consulenza Pizza">
<title>Consulenza Pizza — Matteo La Spada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0C0B09;--card:#1A1814;--border:#2A2520;--cream:#F0E8D8;--dim:#8A7C6A;--gold:#C8973A;--gold2:#D4A853;}
html,body{height:100%;background:var(--bg);overflow:hidden;font-family:"DM Sans",sans-serif;color:var(--cream)}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:1000;padding:40px}
.sp-logo{font-family:"Playfair Display",serif;font-size:40px;font-weight:900;color:var(--cream)}
.sp-logo em{color:var(--gold);font-style:italic}
.sp-sub{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;text-align:center}
.sp-btn{width:100%;max-width:320px;padding:18px;border:1px solid var(--gold);border-radius:16px;background:transparent;color:var(--cream);font-size:15px;cursor:pointer}
.sp-btn:active{background:rgba(200,151,58,0.1)}
#app{position:fixed;inset:0;display:none;flex-direction:column}
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-back{font-size:22px;cursor:pointer;color:var(--gold);padding:2px 8px 2px 0}
.hdr-titles{flex:1}
.hdr-title{font-family:"Playfair Display",serif;font-size:17px;font-weight:700}
.hdr-title em{color:var(--gold);font-style:italic}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:1px}
.hdr-action{margin-left:auto;font-size:13px;color:var(--gold);cursor:pointer;padding:7px 12px;border:1px solid var(--border);border-radius:10px;white-space:nowrap;flex-shrink:0}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:50px}
.client-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px}
.client-btn:active{opacity:0.75}
.client-icon{width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:13px;flex-shrink:0;font-size:20px;font-weight:700;font-family:"Playfair Display",serif;letter-spacing:0;text-transform:uppercase;}
.client-name{font-size:15px;font-weight:600}
.client-sub{font-size:11px;color:var(--dim);margin-top:3px}
.add-btn{border:1px dashed var(--border);border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--dim);font-size:14px;background:transparent;width:100%}
.section-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;margin-top:4px}
.tabs{display:flex;gap:6px;padding:0 0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.pizza-item{padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.pizza-item:last-child{border-bottom:none}
.pizza-item:active{opacity:0.7}
.p-info{flex:1}
.p-name{font-size:14px;font-weight:500}
.p-sub{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4}
.p-arr{color:var(--dim);font-size:16px}
.cat-header{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;padding:14px 0 6px;font-family:"DM Mono",monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.card-hdr{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.card-icon{font-size:18px;flex-shrink:0}
.card-meta{flex:1}
.card-tag{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.card-title2{font-size:14px;font-weight:600;color:var(--cream)}
.card-body{padding:0 16px 16px}
.card.closed .card-body{display:none}
.inp-group{margin-bottom:14px}
.inp-label{font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:6px}
.inp-field{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--cream);font-size:14px;width:100%;-webkit-appearance:none}
.inp-field:focus{border-color:var(--gold);outline:none}
select.inp-field{background-image:none}
.inp-row{display:flex;gap:8px;align-items:center}
.inp-half{width:50%}
.ingr-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.ingr-row:last-child{border-bottom:none}
.ingr-num{font-size:10px;color:var(--dim);width:16px;flex-shrink:0;text-align:center}
.ingr-name-inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--cream);font-size:13px;flex:1;min-width:0}
.ingr-name-inp:focus{border-color:var(--gold);outline:none}
.ingr-g-inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 8px;color:var(--cream);font-size:13px;width:62px;text-align:center}
.ingr-g-inp:focus{border-color:var(--gold);outline:none}
.ingr-del{color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}
.btn{padding:13px 18px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn:active{opacity:0.8}
.btn-gold{background:var(--gold);color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--cream)}
.btn-pdf{background:rgba(200,151,58,0.12);border:1px solid rgba(200,151,58,0.4);color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-import{background:rgba(200,151,58,0.08);border:1px solid rgba(200,151,58,0.3);color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-copy{background:rgba(200,151,58,0.08);border:1px solid rgba(200,151,58,0.3);color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-copy:active{opacity:0.8}
.btn-lista{background:rgba(200,151,58,0.12);border:1px solid rgba(200,151,58,0.4);color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-lista:active{opacity:0.8}
.btn-import:active{opacity:0.8}
.btn-add{background:transparent;border:1px dashed var(--border);border-radius:10px;color:var(--dim);font-size:13px;padding:9px;width:100%;margin-top:8px;cursor:pointer;text-align:center}
.btn-add:active{opacity:0.7}
.cottura-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end}
.modal-bg.hidden{display:none}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.modal-close{float:right;font-size:22px;color:var(--dim);cursor:pointer;margin-top:-4px}
.hidden{display:none!important}
.ingr-cat-title{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;padding:10px 0 6px;font-family:"DM Mono",monospace}
.ingr-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.ingr-chip{padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--cream)}
.ingr-chip:active{background:rgba(200,151,58,0.15);border-color:var(--gold)}
.import-source-btn{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.import-source-btn:active{opacity:0.75}
.import-source-btn.selected{border-color:var(--gold);background:rgba(200,151,58,0.08)}
.import-source-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0;font-size:16px;font-weight:700;font-family:"Playfair Display",serif;text-transform:uppercase}
.import-source-info{flex:1}
.import-source-name{font-size:14px;font-weight:600}
.import-source-count{font-size:11px;color:var(--dim);margin-top:2px}
.import-check{font-size:18px;color:var(--gold)}
.pizza-check-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:12px}
.pizza-check-item:active{opacity:0.75}
.pizza-check-item.checked{border-color:var(--gold);background:rgba(200,151,58,0.08)}
.pizza-check-cat{font-size:10px;color:var(--dim);margin-top:2px}
.pizza-check-box{width:22px;height:22px;border:1px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.pizza-check-item.checked .pizza-check-box{background:var(--gold);border-color:var(--gold);color:#000}
.import-step{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;margin-top:4px}
@media print{
  body{background:#fff;color:#000;overflow:visible}
  #splash,#app .hdr,#pgPizza .card-hdr,#pgPizza .btn,.btn-pdf,.btn-ghost{display:none!important}
  #app{position:static;display:block!important}
  #pgPizza{display:block!important;overflow:visible;padding:20px}
  .card{background:#fff;border:1px solid #ccc;margin-bottom:16px;page-break-inside:avoid}
  .card-body{display:block!important}
  .ingr-name-inp,.ingr-g-inp,.inp-field{border:none;background:transparent;padding:0;font-size:13px}
  .pdf-header{display:block!important}
}
.pdf-header{display:none;margin-bottom:20px;border-bottom:2px solid #000;padding-bottom:12px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
</head>
<body>

<div id="splash">
  <div style="font-size:52px">🍕</div>
  <div class="sp-logo">Consulenza <em>Pizza</em></div>
  <div class="sp-sub">Matteo La Spada · Schede Prodotto · Cottura</div>
  <div style="height:10px"></div>
  <button class="sp-btn" onclick="startApp()">Apri Gestione Clienti</button>
</div>

<div id="app">
  <div class="hdr">
    <div id="backBtn" class="hdr-back hidden" onclick="navBack()">←</div>
    <div class="hdr-titles">
      <div class="hdr-title" id="hdrTitle">Consulenza <em>Pizza</em></div>
      <div class="hdr-sub" id="hdrSub">Matteo La Spada</div>
    </div>
    <div id="hdrAction" class="hdr-action hidden"></div>
  </div>
  <div class="scroll hidden" id="pgHome">
    <div class="section-label">I tuoi clienti</div>
    <div id="clientList"></div>
    <button class="add-btn" onclick="openModal('modalClient')">＋ Aggiungi cliente</button>
  </div>
  <div class="scroll hidden" id="pgClient">
    <div class="tabs" id="clientTabs">
      <button class="tab on" onclick="switchTab('pizze',this)">🍕 Pizze</button>
      <button class="tab" onclick="switchTab('info',this)">📋 Info locale</button>
    </div>
    <div id="tabPizze"></div>
    <div id="tabInfo" class="hidden"></div>
  </div>
  <div class="scroll hidden" id="pgPizza"></div>
</div>

<!-- MODAL NUOVO CLIENTE -->
<div class="modal-bg hidden" id="modalClient">
  <div class="modal">
    <span class="modal-close" onclick="closeModal('modalClient')">✕</span>
    <div class="modal-title">Nuovo Cliente</div>
    <div class="inp-group"><label class="inp-label">Nome locale</label><input class="inp-field" id="mcNome" placeholder="Es. Pizzeria da Mario"></div>
    <div class="inp-group"><label class="inp-label">Città</label><input class="inp-field" id="mcCitta" placeholder="Es. Palermo"></div>
    <div class="inp-group"><label class="inp-label">Tipo impasto</label>
      <select class="inp-field" id="mcTipo">
        <option value="Teglia Romana">Teglia Romana</option>
        <option value="Pizza Tonda">Pizza Tonda Napoletana</option>
        <option value="Pala Romana">Pala Romana</option>
        <option value="Mista">Mista</option>
      </select>
    </div>
    <div class="inp-group"><label class="inp-label">Tipo forno</label>
      <select class="inp-field" id="mcForno">
        <option value="Elettrico statico">Elettrico statico</option>
        <option value="Elettrico ventilato">Elettrico ventilato</option>
        <option value="Elettrico combinato vapore">Elettrico combinato vapore</option>
        <option value="Gas statico">Gas statico</option>
        <option value="Legna">Legna</option>
        <option value="Ibrido legna/elettrico">Ibrido legna/elettrico</option>
      </select>
    </div>
    <button class="btn btn-gold" onclick="saveClient()">Crea Cliente</button>
  </div>
</div>

<!-- PAGINA NUOVA PIZZA (inline, non modal) -->
<div class="scroll hidden" id="pgNuovaPizza" style="padding-bottom:100px">

  <!-- Nome -->
  <div style="padding:18px 16px 10px">
    <div style="font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;font-weight:600">Nome pizza</div>
    <input id="npNome" type="text" placeholder="Es. Margherita Speciale..."
      style="background:var(--bg);border:2px solid var(--gold);border-radius:12px;padding:14px 16px;color:var(--cream);font-size:18px;font-family:inherit;width:100%;outline:none;font-weight:600"
      oninput="npNomeChange(this.value)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('npIngr0Name')&&document.getElementById('npIngr0Name').focus();}">
  </div>

  <!-- Categoria — bottoni colorati -->
  <div style="padding:0 16px 14px">
    <div style="font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;font-weight:600">Categoria</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px" id="npCatBtns">
      <button onclick="npSelCat(this,'🔴 Rossa')"     style="padding:8px 14px;border-radius:20px;border:2px solid #c0392b;background:rgba(192,57,43,0.15);color:#c0392b;font-size:13px;font-weight:600;cursor:pointer" class="npcat-btn npcat-sel">🔴 Rossa</button>
      <button onclick="npSelCat(this,'⬜ Bianca')"    style="padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--cream);font-size:13px;font-weight:600;cursor:pointer" class="npcat-btn">⬜ Bianca</button>
      <button onclick="npSelCat(this,'🟣 Speciale')"  style="padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--cream);font-size:13px;font-weight:600;cursor:pointer" class="npcat-btn">🟣 Speciale</button>
      <button onclick="npSelCat(this,'🟡 Stagionale')" style="padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--cream);font-size:13px;font-weight:600;cursor:pointer" class="npcat-btn">🟡 Stagionale</button>
      <button onclick="npSelCat(this,'🌿 Vegana')"    style="padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--cream);font-size:13px;font-weight:600;cursor:pointer" class="npcat-btn">🌿 Vegana</button>
      <button onclick="npSelCat(this,'🫓 Pala Ripiena')" style="padding:8px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--cream);font-size:13px;font-weight:600;cursor:pointer" class="npcat-btn">🫓 Pala Ripiena</button>
    </div>
  </div>

  <!-- Ingredienti -->
  <div style="border-top:1px solid var(--border);padding-top:14px">
    <div style="padding:0 16px 10px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;font-weight:600">Ingredienti</div>
      <div style="font-size:11px;color:var(--dim)">nome · grammi</div>
    </div>
    <div id="npIngrList"></div>
    <div style="padding:8px 16px">
      <button onclick="npAddIngr()" style="background:transparent;border:2px dashed var(--border);border-radius:12px;color:var(--gold);font-size:14px;font-weight:600;padding:12px;width:100%;cursor:pointer;font-family:inherit">＋ Aggiungi ingrediente</button>
    </div>
  </div>

  <!-- Finitura -->
  <div style="padding:10px 16px">
    <div style="font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:8px;font-weight:600">Finitura a crudo (opzionale)</div>
    <input id="npFinitura" type="text" placeholder="Es. Rucola fresca · basilico a crudo dopo cottura"
      style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--cream);font-size:14px;font-family:inherit;width:100%;outline:none">
  </div>

  <!-- Bottone salva fisso in basso -->
  <div style="position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:var(--bg);border-top:1px solid var(--border);z-index:50">
    <button onclick="npSalva()" id="npBtnSalva"
      style="width:100%;background:var(--gold);color:#000;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;opacity:0.4;pointer-events:none"
      disabled>
      Salva Pizza
    </button>
  </div>
</div>

<!-- MODAL INGREDIENTI -->
<div class="modal-bg hidden" id="modalIngr">
  <div class="modal" style="max-height:85vh">
    <span class="modal-close" onclick="closeModal('modalIngr')">✕</span>
    <div class="modal-title">Aggiungi Ingrediente</div>
    <div class="inp-group">
      <label class="inp-label">Cerca ingrediente</label>
      <input class="inp-field" id="ingrSearch" placeholder="Es. mozzarella..." oninput="filterIngr(this.value)">
    </div>
    <div id="ingrCategories"></div>
    <div style="height:12px"></div>
    <div style="font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px">Oppure scrivi manuale</div>
    <div style="display:flex;gap:8px">
      <input class="inp-field" id="ingrCustomNome" placeholder="Nome ingrediente" style="flex:1">
      <input class="inp-field" id="ingrCustomG" type="number" placeholder="g" style="width:70px">
    </div>
    <button class="btn btn-gold" style="margin-top:10px" onclick="addIngrCustom()">＋ Aggiungi</button>
  </div>
</div>

<!-- MODAL IMPORTA PIZZE -->
<div class="modal-bg hidden" id="modalImport">
  <div class="modal" style="max-height:90vh">
    <span class="modal-close" onclick="closeModal('modalImport')">✕</span>
    <div class="modal-title" id="importTitle">Importa Pizze</div>
    <div id="importBody"></div>
  </div>
</div>

<!-- MODAL COPIA PIZZA -->
<div class="modal-bg hidden" id="modalCopia">
  <div class="modal">
    <span class="modal-close" onclick="closeModal('modalCopia')">✕</span>
    <div class="modal-title" id="copiaTitle">Copia pizza in...</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:16px" id="copiaSub"></div>
    <div id="copiaClientList"></div>
  </div>
</div>

<script>
var nav=[];
var PALETTE=[{bg:'#C8973A',text:'#000'},{bg:'#6B4226',text:'#fff'},{bg:'#3A7D44',text:'#fff'},{bg:'#2E6DA4',text:'#fff'},{bg:'#7B3FA0',text:'#fff'},{bg:'#C0392B',text:'#fff'},{bg:'#16A085',text:'#fff'},{bg:'#D4AC0D',text:'#000'}];
function getClientColor(idx){return PALETTE[idx%PALETTE.length];}
function getClientInitial(nome){if(!nome)return'?';var clean=nome.replace(/^l['\u2019\u2018`]/i,'').trim();return clean.charAt(0).toUpperCase();}
var DB=loadDB();

function loadDB(){try{var d=localStorage.getItem('cpv3');if(d){var parsed=JSON.parse(d);if(parsed.clients){parsed.clients.forEach(function(c){delete c.icon;});var ids=parsed.clients.map(function(c){return c.id;});if(ids.indexOf('liberty')<0){parsed.clients.push({id:'liberty',nome:'Liberty',citta:'Bagheria',tipo:'Mista',forno:'Elettrico statico',tCottura:250,tRigenerazione:0,tMinuti:2,vapore:false,ventilato:false,note:'',pizze:[]});}if(ids.indexOf('lab40')<0){parsed.clients.push({id:'lab40',nome:'4.0 Lab',citta:'Rende',tipo:'Mista',forno:'Elettrico statico',tCottura:250,tRigenerazione:0,tMinuti:2,vapore:false,ventilato:false,note:'',pizze:[]});}}return parsed;}}catch(e){}return defaultDB();}

function showToast(msg){var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1814;border:1px solid #C8973A;color:#F0E8D8;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity 0.3s';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._timer);t._timer=setTimeout(function(){t.style.opacity='0';},2000);}
function getClient(id){return DB.clients.find(function(c){return c.id===id;});}
function getPizza(cid,pid){return getClient(cid).pizze.find(function(p){return p.id===pid;});}
function startApp(){document.getElementById('splash').style.display='none';document.getElementById('app').style.display='flex';nav=[];showPage('pgHome');renderHome();}
function showPage(id){['pgHome','pgClient','pgPizza','pgNuovaPizza'].forEach(function(p){document.getElementById(p).classList.add('hidden');});document.getElementById(id).classList.remove('hidden');}
function navBack(){

  if(!document.getElementById('pgNuovaPizza').classList.contains('hidden')){
    var cid = _npCid;
    var c = getClient(cid);
    showPage('pgClient');
    setHdr(c.nome, c.citta||c.tipo, true);
    setAction('+ Pizza', function(){ openModalPizza(cid); });

}

function setHdr(title,sub,back){document.getElementById('hdrTitle').innerHTML=title;document.getElementById('hdrSub').textContent=sub;document.getElementById('backBtn').classList.toggle('hidden',!back);}
function setAction(label,fn){var el=document.getElementById('hdrAction');el.textContent=label;el.onclick=fn;el.classList.remove('hidden');}
function switchTab(tab,btn){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});if(btn)btn.classList.add('on');document.getElementById('tabPizze').classList.toggle('hidden',tab!=='pizze');document.getElementById('tabInfo').classList.toggle('hidden',tab!=='info');var cid=nav[nav.length-1]&&nav[nav.length-1].cid;if(tab==='pizze'&&cid)renderPizze(cid);if(tab==='info'&&cid)renderInfo(cid);}
function renderHome(){var html='';DB.clients.forEach(function(c,idx){var col=getClientColor(idx);var letter=getClientInitial(c.nome);html+='<div class="client-btn" onclick="openClient(\''+c.id+'\')">';html+='<div class="client-icon" style="background:'+col.bg+';color:'+col.text+'">'+letter+'</div>';html+='<div style="flex:1"><div class="client-name">'+c.nome+'</div><div class="client-sub">'+(c.citta?c.citta+' \u00b7 ':'')+c.tipo+' \u00b7 '+(c.pizze.length)+' pizze</div></div><div style="color:var(--dim);font-size:18px">\u203a</div></div>';});document.getElementById('clientList').innerHTML=html;}
function renderPizze(cid){var c=getClient(cid);var pizze=c.pizze||[];if(!pizze.length){document.getElementById('tabPizze').innerHTML='<div style="color:var(--dim);text-align:center;padding:50px 0;font-size:14px">Nessuna pizza ancora<br><br>Tocca <strong style="color:var(--gold)">+ Pizza</strong> in alto</div><button class="btn-import" onclick="openImportModal(\''+cid+'\')">📋 Importa pizze da altro cliente</button>';return;}var cats={};pizze.forEach(function(p){if(!cats[p.cat])cats[p.cat]=[];cats[p.cat].push(p);});var html='';Object.keys(cats).forEach(function(cat){html+='<div class="cat-header">'+cat+'</div>';cats[cat].forEach(function(p){var ingr=(p.ingredienti||[]).slice(0,3).map(function(i){return i.nome;}).join(' \u00b7 ');if((p.ingredienti||[]).length>3)ingr+=' +altri';html+='<div class="pizza-item" onclick="openPizza(\''+cid+'\','+p.id+')">';html+='<div class="p-info"><div class="p-name">'+p.nome+'</div>';if(ingr)html+='<div class="p-sub">'+ingr+'</div>';html+='</div><div style="font-size:10px;color:var(--dim);margin-right:4px">'+p.stato+'</div><div class="p-arr">\u203a</div></div>';});});html+='<div style="height:16px"></div>';html+='<button class="btn-lista" onclick="exportListaIngredienti(\''+cid+'\')">🛒 Lista ingredienti PDF</button>';html+='<button class="btn-import" onclick="openImportModal(\''+cid+'\')">📋 Importa pizze da altro cliente</button>';document.getElementById('tabPizze').innerHTML=html;}
function renderInfo(cid){var c=getClient(cid);var html='<div class="card"><div class="card-hdr"><div class="card-icon">\ud83d\udccd</div><div class="card-meta"><div class="card-tag">Anagrafica</div><div class="card-title2">Dati Locale</div></div></div><div class="card-body">';html+=fld('Nome','nome',c.nome,'text');html+=fld('Citt\u00e0','citta',c.citta,'text');html+=fld('Tipo impasto','tipo',c.tipo,'text');html+='</div></div>';html+='<div class="card"><div class="card-hdr"><div class="card-icon">\ud83d\udd25</div><div class="card-meta"><div class="card-tag">Forno principale</div><div class="card-title2">Parametri Cottura</div></div></div><div class="card-body">';html+=sel('Tipo forno','forno',c.forno,['Elettrico statico','Elettrico ventilato','Elettrico combinato vapore','Gas statico','Legna','Ibrido legna/elettrico']);html+=fldN('Temp. cottura \u00b0C','tCottura',c.tCottura);html+=fldN('Temp. rigenerazione \u00b0C','tRigenerazione',c.tRigenerazione);html+=fldN('Tempo cottura (min)','tMinuti',c.tMinuti,'step','0.5');html+='<div class="inp-group"><label class="inp-label">Opzioni forno</label><div style="display:flex;gap:12px"><label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" id="ci_vapore" '+(c.vapore?'checked':'')+' onchange="upCBool(\'vapore\',this.checked)"> Vapore</label><label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" id="ci_ventilato" '+(c.ventilato?'checked':'')+' onchange="upCBool(\'ventilato\',this.checked)"> Ventilato</label></div></div></div></div>';html+='<div class="card"><div class="card-hdr"><div class="card-icon">\ud83d\udcdd</div><div class="card-meta"><div class="card-tag">Note</div><div class="card-title2">Annotazioni Consulente</div></div></div><div class="card-body"><textarea class="inp-field" id="ci_note" rows="4" oninput="upCStr(\'note\',this.value)">'+escHtml(c.note||'')+'</textarea></div></div>';document.getElementById('tabInfo').innerHTML=html;}
function fld(label,key,val,type){return '<div class="inp-group"><label class="inp-label">'+label+'</label><input class="inp-field" type="'+(type||'text')+'" value="'+escHtml(val||'')+'" oninput="upCStr(\''+key+'\',this.value)"></div>';}
function fldN(label,key,val,attr,attrVal){return '<div class="inp-group"><label class="inp-label">'+label+'</label><input class="inp-field" type="number" '+(attr?attr+'="'+attrVal+'"':'')+' value="'+(val||'')+'" oninput="upCNum(\''+key+'\',this.value)"></div>';}
function sel(label,key,val,opts){var o=opts.map(function(op){return '<option'+(op===val?' selected':'')+'>'+op+'</option>';}).join('');return '<div class="inp-group"><label class="inp-label">'+label+'</label><select class="inp-field" onchange="upCStr(\''+key+'\',this.value)">'+o+'</select></div>';}
function upCStr(key,val){var c=getClient(nav[nav.length-1].cid);c[key]=val;save();}
function upCNum(key,val){var c=getClient(nav[nav.length-1].cid);c[key]=parseFloat(val)||0;save();}
function upCBool(key,val){var c=getClient(nav[nav.length-1].cid);c[key]=val;save();}
var _importDestCid='',_importSourceCid='',_importSelected=[];
function openImportModal(destCid){_importDestCid=destCid;_importSourceCid='';_importSelected=[];document.getElementById('importTitle').textContent='Importa Pizze';renderImportStep1();openModal('modalImport');}
function renderImportStep1(){var html='<div class="import-step">Passo 1 di 2 — Scegli il cliente sorgente</div>';DB.clients.forEach(function(c,idx){if(c.id===_importDestCid)return;if(!c.pizze||!c.pizze.length)return;var col=getClientColor(idx);var letter=getClientInitial(c.nome);html+='<div class="import-source-btn" id="src_'+c.id+'" onclick="selectImportSource(\''+c.id+'\')">';html+='<div class="import-source-icon" style="background:'+col.bg+';color:'+col.text+'">'+letter+'</div>';html+='<div class="import-source-info"><div class="import-source-name">'+c.nome+'</div><div class="import-source-count">'+(c.citta?c.citta+' \u00b7 ':'')+c.pizze.length+' pizze disponibili</div></div><div class="import-check" id="chk_src_'+c.id+'" style="display:none">\u2713</div></div>';});document.getElementById('importBody').innerHTML=html;}
function selectImportSource(cid){_importSourceCid=cid;_importSelected=[];document.querySelectorAll('.import-source-btn').forEach(function(b){b.classList.remove('selected');});document.querySelectorAll('[id^="chk_src_"]').forEach(function(b){b.style.display='none';});var btn=document.getElementById('src_'+cid);if(btn)btn.classList.add('selected');var chk=document.getElementById('chk_src_'+cid);if(chk)chk.style.display='block';setTimeout(function(){renderImportStep2();},200);}
function renderImportStep2(){var src=getClient(_importSourceCid);var dest=getClient(_importDestCid);var destNomi=(dest.pizze||[]).map(function(p){return p.nome.toLowerCase();});document.getElementById('importTitle').textContent='Da '+src.nome;var html='<div class="import-step" style="display:flex;justify-content:space-between;align-items:center"><span>Passo 2 di 2</span><span style="color:var(--gold);font-size:12px;cursor:pointer" onclick="toggleSelectAll()">Seleziona tutto</span></div>';var cats={};(src.pizze||[]).forEach(function(p){if(!cats[p.cat])cats[p.cat]=[];cats[p.cat].push(p);});Object.keys(cats).forEach(function(cat){html+='<div class="cat-header" style="padding:10px 0 6px">'+cat+'</div>';cats[cat].forEach(function(p){var exists=destNomi.indexOf(p.nome.toLowerCase())>=0;var badge=exists?'<span style="font-size:10px;color:var(--dim);margin-left:6px">già presente</span>':'';html+='<div class="pizza-check-item" id="pci_'+p.id+'" onclick="togglePizzaCheck('+p.id+')"><div class="pizza-check-box" id="pcb_'+p.id+'"></div><div style="flex:1"><div style="font-size:14px;font-weight:500">'+escHtml(p.nome)+badge+'</div>';var ingr=(p.ingredienti||[]).slice(0,3).map(function(i){return i.nome;}).join(' \u00b7 ');if(ingr)html+='<div class="pizza-check-cat">'+ingr+'</div>';html+='</div></div>';});});html+='<div style="height:14px"></div><div id="importCount" style="font-size:12px;color:var(--dim);text-align:center;margin-bottom:8px">Nessuna pizza selezionata</div><button class="btn btn-gold" onclick="eseguiImport()">Importa selezionate</button><button class="btn btn-ghost" style="margin-top:8px" onclick="renderImportStep1()">← Cambia cliente</button>';document.getElementById('importBody').innerHTML=html;}
function togglePizzaCheck(pid){var idx=_importSelected.indexOf(pid);var item=document.getElementById('pci_'+pid);var box=document.getElementById('pcb_'+pid);if(idx<0){_importSelected.push(pid);if(item)item.classList.add('checked');if(box)box.textContent='\u2713';}else{_importSelected.splice(idx,1);if(item)item.classList.remove('checked');if(box)box.textContent='';}var cnt=document.getElementById('importCount');if(cnt)cnt.textContent=_importSelected.length>0?_importSelected.length+' pizza'+(_importSelected.length>1?'e':'')+' selezionata'+(_importSelected.length>1?'':''):'Nessuna pizza selezionata';}
function toggleSelectAll(){var src=getClient(_importSourceCid);var allIds=(src.pizze||[]).map(function(p){return p.id;});var allSelected=allIds.every(function(id){return _importSelected.indexOf(id)>=0;});if(allSelected){_importSelected=[];allIds.forEach(function(pid){var item=document.getElementById('pci_'+pid);var box=document.getElementById('pcb_'+pid);if(item)item.classList.remove('checked');if(box)box.textContent='';});}else{_importSelected=allIds.slice();allIds.forEach(function(pid){var item=document.getElementById('pci_'+pid);var box=document.getElementById('pcb_'+pid);if(item)item.classList.add('checked');if(box)box.textContent='\u2713';});}var cnt=document.getElementById('importCount');if(cnt)cnt.textContent=_importSelected.length>0?_importSelected.length+' pizze selezionate':'Nessuna pizza selezionata';}

// ══ NUOVA PIZZA — pagina full screen ══
var _npCid = '';
var _npCat = '🔴 Rossa';
var _npIngrCount = 0;

function openModalPizza(cid){
  _npCid = cid;
  _npCat = '🔴 Rossa';
  _npIngrCount = 0;
  // Reset campi
  document.getElementById('npNome').value = '';
  document.getElementById('npFinitura').value = '';
  document.getElementById('npIngrList').innerHTML = '';
  // Reset categoria
  document.querySelectorAll('.npcat-btn').forEach(function(b){
    b.style.background = 'transparent';
    b.style.borderColor = 'var(--border)';
    b.style.color = 'var(--cream)';
    b.classList.remove('npcat-sel');
  });
  var first = document.querySelector('.npcat-btn');
  if(first){ first.style.background='rgba(192,57,43,0.15)'; first.style.borderColor='#c0392b'; first.style.color='#c0392b'; first.classList.add('npcat-sel'); }
  // Disabilita salva
  npToggleSalva(false);
  // Aggiungi prima riga ingrediente
  npAddIngr();
  // Naviga alla pagina
  var c = getClient(cid);
  setHdr('Nuova Pizza', c.nome, true);
  document.getElementById('hdrAction').classList.add('hidden');
  showPage('pgNuovaPizza');
  setTimeout(function(){ document.getElementById('npNome').focus(); }, 100);
}

function npSelCat(btn, cat){
  _npCat = cat;
  document.querySelectorAll('.npcat-btn').forEach(function(b){
    b.style.background = 'transparent';
    b.style.borderColor = 'var(--border)';
    b.style.color = 'var(--cream)';
    b.classList.remove('npcat-sel');
  });
  // Colori per categoria
  var colors = {'🔴 Rossa':'#c0392b','⬜ Bianca':'#8a7a60','🟣 Speciale':'#7b1fa2','🟡 Stagionale':'#c8860a','🌿 Vegana':'#2e7a4f','🫓 Pala Ripiena':'#1565c0'};
  var col = colors[cat] || 'var(--gold)';
  btn.style.background = col + '22';
  btn.style.borderColor = col;
  btn.style.color = col;
  btn.classList.add('npcat-sel');
}

function npAddIngr(){
  var idx = _npIngrCount++;
  var row = document.createElement('div');
  row.id = 'nprow_' + idx;
  row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border)';
  row.innerHTML =
    '<input id="npIngr'+idx+'Name" type="text" placeholder="Ingrediente..." autocomplete="off"' +
    ' style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--cream);font-size:14px;font-family:inherit;outline:none;min-width:0"' +
    ' oninput="npNomeChange()">' +
    '<input id="npIngr'+idx+'G" type="number" placeholder="g" min="0" step="1"' +
    ' style="width:64px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 8px;color:var(--gold);font-size:14px;font-family:monospace;text-align:center;outline:none">' +
    '<span onclick="npDelIngr('+idx+')" style="color:var(--dim);font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1">✕</span>';
  document.getElementById('npIngrList').appendChild(row);
  // Focus sul campo nome del nuovo ingrediente
  setTimeout(function(){ document.getElementById('npIngr'+idx+'Name') && document.getElementById('npIngr'+idx+'Name').focus(); }, 50);
}

function npDelIngr(idx){
  var row = document.getElementById('nprow_' + idx);
  if(row) row.remove();
}

function npNomeChange(){
  var nome = document.getElementById('npNome').value.trim();
  npToggleSalva(nome.length > 0);
}

function npToggleSalva(on){
  var btn = document.getElementById('npBtnSalva');
  if(!btn) return;
  btn.disabled = !on;
  btn.style.opacity = on ? '1' : '0.4';
  btn.style.pointerEvents = on ? 'auto' : 'none';
}

function npSalva(){
  var nome = document.getElementById('npNome').value.trim();
  if(!nome) return;
  var cid = _npCid;
  var c = getClient(cid);
  if(!c) return;
  var maxId = (c.pizze||[]).reduce(function(m,p){return Math.max(m,p.id);},0);
  // Raccoglie ingredienti
  var ingredienti = [];
  for(var i = 0; i < _npIngrCount; i++){
    var nEl = document.getElementById('npIngr'+i+'Name');
    var gEl = document.getElementById('npIngr'+i+'G');
    if(!nEl) continue;
    var n = nEl.value.trim();
    if(!n) continue;
    ingredienti.push({nome:n, g: gEl ? (parseFloat(gEl.value)||0) : 0});
  }
  var finitura = document.getElementById('npFinitura').value.trim();
  c.pizze.push({
    id: maxId+1,
    nome: nome,
    cat: _npCat,
    stato: '\ud83d\udd2c In prova',
    ingredienti: ingredienti,
    finitura: finitura,
    cottura:{forno:c.forno,gradi:c.tCottura,minuti:c.tMinuti,rigenerazione:c.tRigenerazione||0,vapore:c.vapore||false,ventilato:c.ventilato||false},
    note:''
  });
  save();
  // Torna alla lista pizze
  showPage('pgClient');
  setHdr(c.nome, c.citta||c.tipo, true);
  setAction('+ Pizza', function(){ openModalPizza(cid); });
  renderPizze(cid);
}
