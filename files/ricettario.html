<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ricettario">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20512%20512%27%3E%3Crect%20width%3D%27512%27%20height%3D%27512%27%20rx%3D%27115%27%20fill%3D%27%231a1208%27/%3E%3Ctext%20x%3D%27256%27%20y%3D%27330%27%20font-size%3D%27300%27%20text-anchor%3D%27middle%27%3E%F0%9F%93%96%3C/text%3E%3C/svg%3E">
<title>📖 Ricettario — Matteo La Spada</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;1,400&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #1a1208;
    --surface: #241c0e;
    --surface2: #2e2412;
    --border: #3d3020;
    --accent: #e8a020;
    --accent2: #f5c84a;
    --text: #f5ede0;
    --muted: #8a7a60;
    --green: #6dba8a;
    --red: #e07060;
    --tag-bg: #2e2412;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #0f0a04 0%, var(--surface) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .brand-icon {
    font-size: 28px;
    line-height: 1;
  }

  .brand-text {
    font-family: 'Lora', serif;
    font-size: 20px;
    color: var(--accent);
    font-style: italic;
  }

  .brand-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--muted);
  }

  .search-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px 11px 36px;
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 13px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent2);
    color: #1a1208;
    font-weight: 600;
  }

  .count-bar {
    font-size: 10px;
    color: var(--muted);
    padding: 10px 16px 0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* RECIPE LIST */
  .recipe-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .recipe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .recipe-card.open { border-color: var(--accent); }

  .recipe-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    gap: 12px;
  }

  .recipe-emoji {
    font-size: 26px;
    line-height: 1;
    flex-shrink: 0;
    width: 38px;
    text-align: center;
  }

  .recipe-info { flex: 1; min-width: 0; }

  .recipe-title {
    font-family: 'Lora', serif;
    font-size: 16px;
    color: var(--text);
    line-height: 1.3;
  }

  .recipe-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  .recipe-tag {
    font-size: 9px;
    background: rgba(232, 160, 32, 0.15);
    border: 1px solid rgba(232, 160, 32, 0.3);
    border-radius: 6px;
    padding: 2px 7px;
    color: var(--accent);
    white-space: nowrap;
    display: inline-block;
    margin-top: 4px;
  }

  .recipe-arrow {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .recipe-card.open .recipe-arrow { transform: rotate(180deg); }

  .recipe-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .recipe-card.open .recipe-body { display: block; }

  /* MOLTIPLICATORE */
  .mult-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .mult-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex: 1;
  }

  .mult-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .mult-btn:active { background: var(--accent); color: #000; }

  .mult-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent2);
    min-width: 36px;
    text-align: center;
  }

  /* INGREDIENTI */
  .section-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 14px 16px 6px;
    font-weight: 600;
  }

  .ing-table { width: 100%; border-collapse: collapse; }

  .ing-row { border-bottom: 1px solid var(--border); }
  .ing-row:last-child { border-bottom: none; }

  .ing-name {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
  }

  .ing-qty {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--accent2);
    font-weight: 600;
    text-align: right;
    white-space: nowrap;
  }

  /* ISTRUZIONI */
  .istr-block {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .istr-title {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .istr-step {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.65;
  }

  .step-num {
    color: var(--accent);
    font-weight: 700;
    min-width: 20px;
    flex-shrink: 0;
  }

  .istr-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 8px;
  }

  /* PULSANTE SCREENSHOT */
  .share-bar {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .btn-screenshot {
    flex: 1;
    background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
    border: none;
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-screenshot:active { opacity: 0.85; }

  .btn-copy {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 16px;
    cursor: pointer;
  }

  /* CARD DI STAMPA (nascosta, usata per screenshot) */
  .print-card {
    position: fixed;
    left: -9999px;
    top: 0;
    width: 390px;
    background: #1a1208;
    color: #f5ede0;
    font-family: 'Inter', sans-serif;
    padding: 24px;
    border-radius: 0;
  }

  .print-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid #3d3020;
  }

  .print-emoji { font-size: 36px; }

  .print-title {
    font-family: 'Lora', serif;
    font-size: 20px;
    color: #e8a020;
    font-style: italic;
  }

  .print-brand {
    font-size: 10px;
    color: #8a7a60;
    margin-top: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .print-section {
    font-size: 9px;
    color: #8a7a60;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .print-ing-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid #3d3020;
    font-size: 13px;
  }

  .print-ing-qty { color: #f5c84a; font-weight: 600; }

  .print-istr {
    font-size: 12px;
    line-height: 1.7;
    color: #f5ede0;
    margin-top: 8px;
  }

  .print-footer {
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid #3d3020;
    font-size: 10px;
    color: #8a7a60;
    text-align: center;
    letter-spacing: 1px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #000;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="brand-icon">🐻</div>
    <div>

    <span class="search-icon">🔍</span>
    <input class="search-box" type="text" placeholder="Cerca ricetta..." oninput="filterRecipes(this.value)">
  </div>
  <div class="filter-row" id="filterRow"></div>
</header>

<div class="count-bar" id="countBar"></div>
<div class="recipe-list" id="recipeList"></div>
<div class="toast" id="toast"></div>

var tags = ['Tutte'];
recipes.forEach(function(r){ if(tags.indexOf(r.tag)===-1) tags.push(r.tag); });
var activeTag = 'Tutte';
var searchTerm = '';
var multipliers = {};
recipes.forEach(function(r){ multipliers[r.id]=1; });

function buildFilters(){
  var row=document.getElementById('filterRow');
  row.innerHTML=tags.map(function(t){
    return '<button class="filter-btn'+(t===activeTag?' active':'')+'" onclick="setTag(\''+t+'\')">'+t+'</button>';
  }).join('');
}

function setTag(t){ activeTag=t; buildFilters(); renderList(); }
function filterRecipes(v){ searchTerm=v.toLowerCase(); renderList(); }

function getFiltered(){
  return recipes.filter(function(r){
    var mt=activeTag==='Tutte'||r.tag===activeTag;
    var ms=!searchTerm||r.title.toLowerCase().indexOf(searchTerm)!==-1||r.tag.toLowerCase().indexOf(searchTerm)!==-1;
    return mt&&ms;
  });
}

function fmtQty(qty,mult){
  if(qty===0) return 'q.b.';
  var v=qty*mult;
  if(v===Math.floor(v)) return v+'g';
  return v.toFixed(1).replace(/\.0$/,'')+'g';
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function doScreenshot(id){
  var r=recipes.find(function(x){return x.id===id;});
  if(!r) return;
  var mult=multipliers[id]||1;

  // Costruiamo una card temporanea per lo screenshot
  var pc=document.createElement('div');
  pc.className='print-card';
  pc.style.cssText='position:fixed;left:-9999px;top:0;width:390px;background:#1a1208;color:#f5ede0;font-family:Inter,sans-serif;padding:24px;';

  var ingRows=r.ingredienti.map(function(ing){
    var q=ing.unit==='q.b.'?'q.b.':fmtQty(ing.qty,mult);
    return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #3d3020;font-size:13px">'+
      '<span>'+ing.nome+'</span><span style="color:#f5c84a;font-weight:600">'+q+'</span></div>';
  }).join('');

  var istrHTML='';
  r.istruzioni.split('\n').forEach(function(s){
    s=s.trim();if(!s)return;
    var m=s.match(/^(\d+)\.\s*(.*)/);
    if(m) istrHTML+='<div style="display:flex;gap:8px;margin-bottom:8px;font-size:12px;line-height:1.6"><span style="color:#e8a020;font-weight:700;min-width:18px">'+m[1]+'.</span><span>'+m[2]+'</span></div>';
    else istrHTML+='<p style="font-size:12px;line-height:1.6;margin-bottom:8px">'+s+'</p>';
  });

  pc.innerHTML=
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid #3d3020">'+
      '<span style="font-size:40px">'+r.emoji+'</span>'+
      '<div><div style="font-family:Lora,serif;font-size:20px;color:#e8a020;font-style:italic">'+r.title+'</div>'+
      '<div style="font-size:10px;color:#8a7a60;margin-top:3px;letter-spacing:1px;text-transform:uppercase">MATTEO LA SPADA · L\'ORSO MESSINA</div></div>'+
    '</div>'+
    (mult>1?'<div style="background:#2e2412;border:1px solid #3d3020;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:11px;color:#f5c84a">✖ '+mult+' — Dosi moltiplicate per '+mult+'</div>':'')+
    '<div style="font-size:9px;color:#8a7a60;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:600">Ingredienti</div>'+
    ingRows+
    '<div style="font-size:9px;color:#8a7a60;text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px;font-weight:600">Istruzioni</div>'+
    istrHTML+
    '<div style="margin-top:20px;padding-top:12px;border-top:1px solid #3d3020;font-size:10px;color:#8a7a60;text-align:center;letter-spacing:1px">🐻 L\'ORSO MESSINA · #SEGUILORSO</div>';

  document.body.appendChild(pc);

  html2canvas(pc,{backgroundColor:'#1a1208',scale:2,useCORS:true,logging:false}).then(function(canvas){
    document.body.removeChild(pc);
    canvas.toBlob(function(blob){
      // Prova Web Share API (iPhone Safari)
      if(navigator.share && navigator.canShare && navigator.canShare({files:[new File([blob],'ricetta.png',{type:'image/png'})]})){
        var file=new File([blob],'ricetta_'+r.title.replace(/\s+/g,'_')+'.png',{type:'image/png'});
        navigator.share({title:r.title,text:'Ricetta: '+r.title+' — Matteo La Spada',files:[file]})
          .then(function(){showToast('✅ Condiviso!');})
          .catch(function(){downloadImage(canvas,r.title);});
      } else {
        downloadImage(canvas,r.title);
      }
    },'image/png');
  });
}

function downloadImage(canvas,title){
  var link=document.createElement('a');
  link.download='ricetta_'+title.replace(/\s+/g,'_')+'.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
  showToast('📥 Immagine salvata!');
}

function renderList(){
  var filtered=getFiltered();
  document.getElementById('countBar').textContent=filtered.length+' ricette';
  var list=document.getElementById('recipeList');
  list.innerHTML='';

  filtered.forEach(function(r){
    var mult=multipliers[r.id]||1;
    var card=document.createElement('div');
    card.className='recipe-card';card.id='rc_'+r.id;

    var ingHTML=r.ingredienti.map(function(ing){
      var q=ing.unit==='q.b.'?'q.b.':fmtQty(ing.qty,mult);
      return '<tr class="ing-row"><td class="ing-name">'+ing.nome+'</td><td class="ing-qty">'+q+'</td></tr>';
    }).join('');

    var istrHTML='';
    r.istruzioni.split('\n').forEach(function(s){
      s=s.trim();if(!s)return;
      var m=s.match(/^(\d+)\.\s*(.*)/);
      if(m) istrHTML+='<div class="istr-step"><span class="step-num">'+m[1]+'.</span><span>'+m[2]+'</span></div>';
      else istrHTML+='<p class="istr-text">'+s+'</p>';
    });

    card.innerHTML=
      '<div class="recipe-header" onclick="toggleRecipe('+r.id+')">'+
        '<div class="recipe-emoji">'+r.emoji+'</div>'+
        '<div class="recipe-info">'+
          '<div class="recipe-title">'+r.title+'</div>'+
          '<div class="recipe-meta">'+r.ingredienti.length+' ingredienti</div>'+
          '<span class="recipe-tag">'+r.tag+'</span>'+
        '</div>'+
        '<span class="recipe-arrow">▼</span>'+
      '</div>'+
      '<div class="recipe-body">'+
        '<div class="mult-bar">'+
          '<span class="mult-label">Moltiplica dosi</span>'+
          '<button class="mult-btn" onclick="changeMult('+r.id+',-1)">−</button>'+
          '<span class="mult-value" id="mv_'+r.id+'">×'+mult+'</span>'+
          '<button class="mult-btn" onclick="changeMult('+r.id+',1)">+</button>'+
        '</div>'+
        '<div class="section-label">🧾 Ingredienti</div>'+
        '<table class="ing-table" id="ing_'+r.id+'">'+ingHTML+'</table>'+
        '<div class="istr-block">'+
          '<div class="istr-title">📋 Istruzioni</div>'+
          istrHTML+
        '</div>'+
        '<div class="share-bar">'+
          '<button class="btn-screenshot" onclick="doScreenshot('+r.id+')">'+
            '📲 Condividi su WhatsApp'+
          '</button>'+
        '</div>'+
      '</div>';

    list.appendChild(card);
  });
}

function toggleRecipe(id){
  var card=document.getElementById('rc_'+id);
  if(card) card.classList.toggle('open');
}

function changeMult(id,delta){
  var m=(multipliers[id]||1)+delta;
  if(m<1)m=1;
  multipliers[id]=m;
  document.getElementById('mv_'+id).textContent='×'+m;
  var r=recipes.find(function(x){return x.id===id;});
  var table=document.getElementById('ing_'+id);
  if(!r||!table)return;
  var rows=table.querySelectorAll('.ing-row');
  r.ingredienti.forEach(function(ing,i){
    if(rows[i]){
      var q=ing.unit==='q.b.'?'q.b.':fmtQty(ing.qty,m);
      rows[i].querySelector('.ing-qty').textContent=q;
    }
  });
}

buildFilters();
renderList();
</script>
