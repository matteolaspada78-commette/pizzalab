<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Lab v2.2 - Beta Test</title>
    <style>
        /* Stile moderno e pulito */
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 450px; border-top: 8px solid #1b5e20; }
        h1 { color: #1b5e20; text-align: center; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #1b5e20; outline: none; }
        button { width: 100%; padding: 15px; background-color: #1b5e20; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #2e7d32; }
        .result { margin-top: 20px; padding: 15px; background-color: #f1f8e9; border-radius: 10px; border-left: 5px solid #1b5e20; display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

<div class="card">
    <h1>🍕 Pizza Lab v2.2 (Mod)</h1>
    
    <div class="input-group">
        <label>Farina (g)</label>
        <input type="number" id="farina" class="save-data" placeholder="Es. 1000">
    </div>
    
    <div class="input-group">
        <label>Idratazione (%)</label>
        <input type="number" id="idra" class="save-data" placeholder="Es. 65">
    </div>

    <div class="input-group">
        <label>Sale (g per kg farina)</label>
        <input type="number" id="sale" class="save-data" value="25">
    </div>

    <button onclick="generaRicetta()">CALCOLA MODIFICHE</button>

    <div id="box-risultato" class="result">
        <p id="res-acqua"></p>
        <p id="res-sale"></p>
        <p id="res-totale"></p>
    </div>

    <div class="footer">Stai testando la versione su index..html</div>
</div>

<script>
    // LOGICA DI CALCOLO
    function generaRicetta() {
        const f = parseFloat(document.getElementById('farina').value);
        const i = parseFloat(document.getElementById('idra').value);
        const s = parseFloat(document.getElementById('sale').value);

        if (f > 0 && i > 0) {
            const acqua = (f * i) / 100;
            const saleTot = (f / 1000) * s;
            const totale = f + acqua + saleTot;

            document.getElementById('res-acqua').innerHTML = "💧 <b>Acqua:</b> " + acqua.toFixed(0) + "g";
            document.getElementById('res-sale').innerHTML = "🧂 <b>Sale:</b> " + saleTot.toFixed(1) + "g";
            document.getElementById('res-totale').innerHTML = "⚖️ <b>Peso Impasto:</b> " + totale.toFixed(0) + "g";
            document.getElementById('box-risultato').style.display = "block";
        } else {
            alert("Inserisci farina e idratazione!");
        }
    }

    // SALVATAGGIO AUTOMATICO (NON PERDERAI PIÙ I DATI)
    const inputs = document.querySelectorAll('.save-data');
    
    // Salva quando scrivi
    inputs.forEach(input => {
        input.addEventListener('input', () => {
            localStorage.setItem('test_' + input.id, input.value);
        });
    });

    // Recupera quando apri la pagina
    window.onload = () => {
        inputs.forEach(input => {
            const saved = localStorage.getItem('test_' + input.id);
            if (saved) input.value = saved;
        });
    };
</script>

</body>
</html>
