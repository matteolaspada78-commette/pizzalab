<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Consulenza Pizza — Matteo La Spada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0C0B09;--card:#1A1814;--border:#2A2520;--cream:#F0E8D8;--dim:#8A7C6A;--gold:#C8973A;--gold2:#D4A853;}
html,body{height:100%;background:var(--bg);overflow:hidden;font-family:"DM Sans",sans-serif;color:var(--cream)}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:1000;padding:40px}
.sp-logo{font-family:"Playfair Display",serif;font-size:40px;font-weight:900;color:var(--cream)}
.sp-logo em{color:var(--gold);font-style:italic}
.sp-sub{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;text-align:center}
.sp-btn{width:100%;max-width:320px;padding:18px;border:1px solid var(--gold);border-radius:16px;background:transparent;color:var(--cream);font-size:15px;cursor:pointer}
.sp-btn:active{background:rgba(200,151,58,0.1)}
#app{position:fixed;inset:0;display:none;flex-direction:column}
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-back{font-size:22px;cursor:pointer;color:var(--gold);padding:2px 8px 2px 0}
.hdr-titles{flex:1}
.hdr-title{font-family:"Playfair Display",serif;font-size:17px;font-weight:700}
.hdr-title em{color:var(--gold);font-style:italic}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:1px}
.hdr-action{margin-left:auto;font-size:13px;color:var(--gold);cursor:pointer;padding:7px 12px;border:1px solid var(--border);border-radius:10px;white-space:nowrap;flex-shrink:0}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;padding-bottom:50px}
.client-btn{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px}
.client-btn:active{opacity:0.75}
.client-icon{width:46px;height:46px;display:flex;align-items:center;justify-content:center;border-radius:13px;flex-shrink:0;font-size:20px;font-weight:700;font-family:"Playfair Display",serif;letter-spacing:0;text-transform:uppercase;}
.client-name{font-size:15px;font-weight:600}
.client-sub{font-size:11px;color:var(--dim);margin-top:3px}
.add-btn{border:1px dashed var(--border);border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--dim);font-size:14px;background:transparent;width:100%}
.section-label{font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;margin-top:4px}
.tabs{display:flex;gap:6px;padding:0 0 14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}
.pizza-item{padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.pizza-item:last-child{border-bottom:none}
.pizza-item:active{opacity:0.7}
.p-info{flex:1}
.p-name{font-size:14px;font-weight:500}
.p-sub{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4}
.p-arr{color:var(--dim);font-size:16px}
.cat-header{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;padding:14px 0 6px;font-family:"DM Mono",monospace}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.card-hdr{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.card-icon{font-size:18px;flex-shrink:0}
.card-meta{flex:1}
.card-tag{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase}
.card-title2{font-size:14px;font-weight:600;color:var(--cream)}
.card-body{padding:0 16px 16px}
.card.closed .card-body{display:none}
.inp-group{margin-bottom:14px}
.inp-label{font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:6px}
.inp-field{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--cream);font-size:14px;width:100%;-webkit-appearance:none}
.inp-field:focus{border-color:var(--gold);outline:none}
select.inp-field{background-image:none}
.inp-row{display:flex;gap:8px;align-items:center}
.inp-half{width:50%}
.ingr-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.ingr-row:last-child{border-bottom:none}
.ingr-num{font-size:10px;color:var(--dim);width:16px;flex-shrink:0;text-align:center}
.ingr-name-inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--cream);font-size:13px;flex:1;min-width:0}
.ingr-name-inp:focus{border-color:var(--gold);outline:none}
.ingr-g-inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 8px;color:var(--cream);font-size:13px;width:62px;text-align:center}
.ingr-g-inp:focus{border-color:var(--gold);outline:none}
.ingr-del{color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}
.btn{padding:13px 18px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn:active{opacity:0.8}
.btn-gold{background:var(--gold);color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--cream)}
.btn-pdf{background:rgba(200,151,58,0.12);border:1px solid rgba(200,151,58,0.4);color:var(--gold);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-add{background:transparent;border:1px dashed var(--border);border-radius:10px;color:var(--dim);font-size:13px;padding:9px;width:100%;margin-top:8px;cursor:pointer;text-align:center}
.btn-add:active{opacity:0.7}
.cottura-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end}
.modal-bg.hidden{display:none}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-height:80vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.modal-close{float:right;font-size:22px;color:var(--dim);cursor:pointer;margin-top:-4px}
.hidden{display:none!important}
.ingr-cat-title{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;padding:10px 0 6px;font-family:"DM Mono",monospace}
.ingr-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.ingr-chip{padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--cream)}
.ingr-chip:active{background:rgba(200,151,58,0.15);border-color:var(--gold)}
@media print{
  body{background:#fff;color:#000;overflow:visible}
  #splash,#app .hdr,#pgPizza .card-hdr,#pgPizza .btn,.btn-pdf,.btn-ghost{display:none!important}
  #app{position:static;display:block!important}
  #pgPizza{display:block!important;overflow:visible;padding:20px}
  .card{background:#fff;border:1px solid #ccc;margin-bottom:16px;page-break-inside:avoid}
  .card-body{display:block!important}
  .ingr-name-inp,.ingr-g-inp,.inp-field{border:none;background:transparent;padding:0;font-size:13px}
  .pdf-header{display:block!important}
}
.pdf-header{display:none;margin-bottom:20px;border-bottom:2px solid #000;padding-bottom:12px}
</style>

        <option value="Mista">Mista</option>
      </select>
    </div>

        <option value="Elettrico combinato vapore">Elettrico combinato vapore</option>
        <option value="Gas statico">Gas statico</option>
        <option value="Legna">Legna</option>
        <option value="Ibrido legna/elettrico">Ibrido legna/elettrico</option>
      </select>
    </div>
    <button class="btn btn-gold" onclick="saveClient()">Crea Cliente</button>
  </div>
</div>

<div class="modal-bg hidden" id="modalPizza">

    <span class="modal-close" onclick="closeModal('modalPizza')">✕</span>

    <div class="inp-group"><label class="inp-label">Nome pizza</label><input class="inp-field" id="mpNome" placeholder="Es. Margherita"></div>
    <div class="inp-group"><label class="inp-label">Categoria</label>
      <select class="inp-field" id="mpCat">
        <option value="🔴 Rossa">🔴 Rossa</option>
        <option value="⬜ Bianca">⬜ Bianca</option>
        <option value="🟣 Speciale">🟣 Speciale</option>
        <option value="🟡 Stagionale">🟡 Stagionale</option>
        <option value="🌿 Vegana">🌿 Vegana</option>
        <option value="🫓 Pala Ripiena">🫓 Pala Ripiena</option>
      </select>
    </div>
    <button class="btn btn-gold" onclick="savePizza()">Aggiungi Pizza</button>
  </div>
</div>

<div class="modal-bg hidden" id="modalIngr">
  <div class="modal" style="max-height:85vh">
    <span class="modal-close" onclick="closeModal('modalIngr')">✕</span>
    <div class="modal-title">Aggiungi Ingrediente</div>
    <div class="inp-group">
      <label class="inp-label">Cerca ingrediente</label>
      <input class="inp-field" id="ingrSearch" placeholder="Es. mozzarella..." oninput="filterIngr(this.value)">
    </div>
    <div id="ingrCategories"></div>
    <div style="height:12px"></div>
    <div style="font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px">Oppure scrivi manuale</div>

    </div>
    <button class="btn btn-gold" style="margin-top:10px" onclick="addIngrCustom()">＋ Aggiungi</button>
  </div>
</div>

        }
        if(ids.indexOf('lab40')<0){
          parsed.clients.push({id:'lab40',nome:'4.0 Lab',citta:'Rende',tipo:'Mista',forno:'Elettrico statico',tCottura:250,tRigenerazione:0,tMinuti:2,vapore:false,ventilato:false,note:'',pizze:[]});
        }
      }
      return parsed;
    }
  }catch(e){}
  return defaultDB();
}

function save(){
  try{
    localStorage.setItem('cpv3',JSON.stringify(DB));
    showToast('\u2705 Salvato');
  }catch(e){
    showToast('\u26a0\ufe0f Errore salvataggio: '+e.message);
  }
}

function showToast(msg){
  var t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1A1814;border:1px solid #C8973A;color:#F0E8D8;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity 0.3s';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.style.opacity='0';},2000);
}

function getClient(id){return DB.clients.find(function(c){return c.id===id;});}
function getPizza(cid,pid){return getClient(cid).pizze.find(function(p){return p.id===pid;});}

function startApp(){
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='flex';
  nav=[];
  showPage('pgHome');
  renderHome();
}

function showPage(id){
  ['pgHome','pgClient','pgPizza'].forEach(function(p){document.getElementById(p).classList.add('hidden');});
  document.getElementById(id).classList.remove('hidden');
}

function navBack(){
  nav.pop();
  var cur=nav[nav.length-1];
  if(!cur||cur.page==='home'){
    nav=[{page:'home'}];
    showPage('pgHome');renderHome();
    setHdr('Consulenza <em>Pizza</em>','Matteo La Spada',false);
    document.getElementById('hdrAction').classList.add('hidden');
  } else if(cur.page==='client'){
    showPage('pgClient');
    var c=getClient(cur.cid);
    setHdr(c.nome,c.citta||c.tipo,true);
    setAction('+ Pizza',function(){openModalPizza(cur.cid);});
    switchTab('pizze',document.querySelector('.tab.on')||document.querySelector('.tab'));
    renderPizze(cur.cid);
  }
}

var _currentCid='';
function openClient(cid){
  _currentCid=cid;
  nav.push({page:'client',cid:cid});
  var c=getClient(cid);
  showPage('pgClient');
  setHdr(c.nome,c.citta||c.tipo,true);
  setAction('+ Pizza',function(){openModalPizza(cid);});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.tab')[0].classList.add('on');
  document.getElementById('tabPizze').classList.remove('hidden');
  document.getElementById('tabInfo').classList.add('hidden');
  renderPizze(cid);
}

function openPizza(cid,pid){
  nav.push({page:'pizza',cid:cid,pid:pid});
  var p=getPizza(cid,pid);var c=getClient(cid);
  showPage('pgPizza');
  setHdr(p.nome,c.nome+' \u00b7 '+p.cat,true);
  setAction('\ud83d\udcc4 PDF',function(){exportPDF(cid,pid);});
  renderPizzaEdit(cid,pid);
}

function setHdr(title,sub,back){
  document.getElementById('hdrTitle').innerHTML=title;
  document.getElementById('hdrSub').textContent=sub;
  document.getElementById('backBtn').classList.toggle('hidden',!back);
}
function setAction(label,fn){
  var el=document.getElementById('hdrAction');
  el.textContent=label;el.onclick=fn;el.classList.remove('hidden');
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  if(btn)btn.classList.add('on');
  document.getElementById('tabPizze').classList.toggle('hidden',tab!=='pizze');
  document.getElementById('tabInfo').classList.toggle('hidden',tab!=='info');
  var cid=nav[nav.length-1]&&nav[nav.length-1].cid;
  if(tab==='pizze'&&cid)renderPizze(cid);
  if(tab==='info'&&cid)renderInfo(cid);
}

function renderHome(){
  var html='';
  DB.clients.forEach(function(c,idx){
    var col=getClientColor(idx);
    var letter=getClientInitial(c.nome);
    html+='<div class="client-btn" onclick="openClient(\''+c.id+'\')">';
    html+='<div class="client-icon" style="background:'+col.bg+';color:'+col.text+'">'+letter+'</div>';
    html+='<div style="flex:1">';
    html+='<div class="client-name">'+c.nome+'</div>';
    html+='<div class="client-sub">'+(c.citta?c.citta+' \u00b7 ':'')+c.tipo+' \u00b7 '+(c.pizze.length)+' pizze</div>';
    html+='</div><div style="color:var(--dim);font-size:18px">\u203a</div></div>';
  });
  document.getElementById('clientList').innerHTML=html;
}

function renderPizze(cid){
  var c=getClient(cid);var pizze=c.pizze||[];
  if(!pizze.length){
    document.getElementById('tabPizze').innerHTML='<div style="color:var(--dim);text-align:center;padding:50px 0;font-size:14px">Nessuna pizza ancora<br><br>Tocca <strong style="color:var(--gold)">+ Pizza</strong> in alto</div>';
    return;
  }
  var cats={};
  pizze.forEach(function(p){if(!cats[p.cat])cats[p.cat]=[];cats[p.cat].push(p);});
  var html='';
  Object.keys(cats).forEach(function(cat){
    html+='<div class="cat-header">'+cat+'</div>';
    cats[cat].forEach(function(p){
      var ingr=(p.ingredienti||[]).slice(0,3).map(function(i){return i.nome;}).join(' \u00b7 ');
      if((p.ingredienti||[]).length>3)ingr+=' +altri';
      html+='<div class="pizza-item" onclick="openPizza(\''+cid+'\','+p.id+')">';
      html+='<div class="p-info"><div class="p-name">'+p.nome+'</div>';
      if(ingr)html+='<div class="p-sub">'+ingr+'</div>';
      html+='</div>';
      html+='<div style="font-size:10px;color:var(--dim);margin-right:4px">'+p.stato+'</div>';
      html+='<div class="p-arr">\u203a</div></div>';
    });
  });
  document.getElementById('tabPizze').innerHTML=html;
}

function fld(label,key,val,type){return '<div class="inp-group"><label class="inp-label">'+label+'</label><input class="inp-field" type="'+(type||'text')+'" value="'+escHtml(val||'')+'" oninput="upCStr(\''+key+'\',this.value)"></div>';}
function fldN(label,key,val,attr,attrVal){return '<div class="inp-group"><label class="inp-label">'+label+'</label><input class="inp-field" type="number" '+(attr?attr+'="'+attrVal+'"':'')+' value="'+(val||'')+'" oninput="upCNum(\''+key+'\',this.value)"></div>';}
function sel(label,key,val,opts){var o=opts.map(function(op){return '<option'+(op===val?' selected':'')+'>'+op+'</option>';}).join('');return '<div class="inp-group"><label class="inp-label">'+label+'</label><select class="inp-field" onchange="upCStr(\''+key+'\',this.value)">'+o+'</select></div>';}
function upCStr(key,val){var c=getClient(nav[nav.length-1].cid);c[key]=val;save();}
function upCNum(key,val){var c=getClient(nav[nav.length-1].cid);c[key]=parseFloat(val)||0;save();}
function upCBool(key,val){var c=getClient(nav[nav.length-1].cid);c[key]=val;save();}

function pSelCat(label,key,val){
  var opts=['\ud83d\udd34 Rossa','\u2b1c Bianca','\ud83d\udfe3 Speciale','\ud83d\udfe1 Stagionale','\ud83c\udf3f Vegana','\ud83e\uded3 Pala Ripiena'];
  var o=opts.map(function(op){return '<option'+(op===val?' selected':'')+'>'+op+'</option>';}).join('');
  return '<div class="inp-group"><label class="inp-label">'+label+'</label><select class="inp-field" onchange="upPStr(\''+key+'\',this.value)">'+o+'</select></div>';
}
function sel2(label,key,val,opts){
  var o=opts.map(function(op){return '<option'+(op===val?' selected':'')+'>'+op+'</option>';}).join('');
  return '<div class="inp-group"><label class="inp-label">'+label+'</label><select class="inp-field" onchange="upPStr(\''+key+'\',this.value)">'+o+'</select></div>';
}
function ingrRow(i,nome,g){
  return '<div class="ingr-row" id="ir_'+i+'"><div class="ingr-num">'+(i+1)+'</div>'+
    '<input class="ingr-name-inp" type="text" value="'+escHtml(nome||'')+'" placeholder="Ingrediente..." oninput="upIngr('+i+',\'nome\',this.value)">'+
    '<input class="ingr-g-inp" type="number" value="'+(g||'')+'" placeholder="g" oninput="upIngr('+i+',\'g\',parseFloat(this.value)||0)">'+
    '<span class="ingr-del" onclick="delIngr('+i+')">\u2715</span></div>';
}
function psel(label,key,val,opts){
  var o=opts.map(function(op){return '<option'+(op===val?' selected':'')+'>'+op+'</option>';}).join('');
  return '<div class="inp-group"><label class="inp-label">'+label+'</label><select class="inp-field" onchange="upPStr(\'cottura.'+key+'\',this.value)">'+o+'</select></div>';
}
function pfldN(label,key,val,attr,attrVal){
  return '<div class="inp-group"><label class="inp-label">'+label+'</label><input class="inp-field" type="number" '+(attr?attr+'="'+attrVal+'"':'')+' value="'+(val||'')+'" oninput="upPNum(\'cottura.'+key+'\',this.value)"></div>';
}
function upPStr(key,val){
  var s=nav[nav.length-1];var p=getPizza(s.cid,s.pid);
  if(key.indexOf('.')>-1){var k=key.split('.');if(!p[k[0]])p[k[0]]={};p[k[0]][k[1]]=val;}
  else p[key]=val;save();
}
function upPNum(key,val){
  var s=nav[nav.length-1];var p=getPizza(s.cid,s.pid);
  if(key.indexOf('.')>-1){var k=key.split('.');if(!p[k[0]])p[k[0]]={};p[k[0]][k[1]]=parseFloat(val)||0;}
  else p[key]=parseFloat(val)||0;save();
}
function upPBool(key,val){
  var s=nav[nav.length-1];var p=getPizza(s.cid,s.pid);
  if(key.indexOf('.')>-1){var k=key.split('.');if(!p[k[0]])p[k[0]]={};p[k[0]][k[1]]=val;}
  else p[key]=val;save();
}
function upIngr(i,field,val){
  var s=nav[nav.length-1];var p=getPizza(s.cid,s.pid);
  if(p.ingredienti[i])p.ingredienti[i][field]=val;save();
}
function addIngr(cid,pid){openIngrModal(cid,pid);}
function delIngr(i){
  var s=nav[nav.length-1];var p=getPizza(s.cid,s.pid);
  p.ingredienti.splice(i,1);save();renderPizzaEdit(s.cid,s.pid);
}
function deletePizza(cid,pid){
  if(!confirm('Eliminare questa pizza?'))return;
  var c=getClient(cid);c.pizze=c.pizze.filter(function(p){return p.id!==pid;});
  save();navBack();
}

  if(p.note){w.document.write('<div class="section"><div class="section-title">\ud83d\udcdd Note consulente</div><div class="note-box">'+escHtml(p.note)+'</div></div>');}
  w.document.write('<div class="footer">Pizza Lab \u00b7 Matteo La Spada \u00b7 Consulenza Tecnica</div></body></html>');
  w.document.close();w.focus();setTimeout(function(){w.print();},400);
}

function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}

function saveClient(){
  var nome=document.getElementById('mcNome').value.trim();
  if(!nome)return;
  var id=nome.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,12)+'_'+Date.now();
  var tipo=document.getElementById('mcTipo').value;
  DB.clients.push({
    id:id,nome:nome,citta:document.getElementById('mcCitta').value,
    tipo:tipo,forno:document.getElementById('mcForno').value,
    tCottura:250,tRigenerazione:0,tMinuti:2,vapore:false,ventilato:false,
    note:'',pizze:[]
  });
  save();closeModal('modalClient');renderHome();showPage('pgHome');
}

function openModalPizza(cid){
  _currentCid=cid;
  document.getElementById('mpNome').value='';
  var sel=document.getElementById('mpCat');if(sel)sel.selectedIndex=0;
  openModal('modalPizza');
}

function savePizza(){
  var nome=document.getElementById('mpNome').value.trim();
  if(!nome)return;
  var cid=_currentCid||nav[nav.length-1].cid;
  if(!cid){alert('Errore: nessun cliente selezionato');return;}
  var c=getClient(cid);if(!c){alert('Cliente non trovato');return;}
  var maxId=(c.pizze||[]).reduce(function(m,p){return Math.max(m,p.id);},0);
  var cat=document.getElementById('mpCat').value;
  c.pizze.push({id:maxId+1,nome:nome,cat:cat,stato:'\ud83d\udd2c In prova',ingredienti:[],finitura:'',
    cottura:{forno:c.forno,gradi:c.tCottura,minuti:c.tMinuti,rigenerazione:c.tRigenerazione,vapore:c.vapore,ventilato:c.ventilato},note:''});
  save();closeModal('modalPizza');document.getElementById('mpNome').value='';renderPizze(cid);
}

var _ingrCid='',_ingrPid=0;
function openIngrModal(cid,pid){
  _ingrCid=cid;_ingrPid=pid;
  document.getElementById('ingrSearch').value='';
  document.getElementById('ingrCustomNome').value='';
  document.getElementById('ingrCustomG').value='';
  renderIngrDB('');openModal('modalIngr');
}
function renderIngrDB(q){
  var html='';
  Object.keys(INGR_DB).forEach(function(cat){
    var items=INGR_DB[cat].filter(function(i){return !q||i.nome.toLowerCase().includes(q.toLowerCase());});
    if(!items.length)return;
    html+='<div class="ingr-cat-title">'+cat+'</div><div class="ingr-chips">';
    items.forEach(function(i){html+='<div class="ingr-chip" data-nome="'+escHtml(i.nome)+'" data-g="'+i.g+'" onclick="addIngrFromDB(this.dataset.nome,parseFloat(this.dataset.g))">'+escHtml(i.nome)+'</div>';});
    html+='</div>';
  });
  document.getElementById('ingrCategories').innerHTML=html||'<div style="color:var(--dim);padding:10px 0;font-size:13px">Nessun risultato \u2014 usa il campo manuale</div>';
}
function filterIngr(q){renderIngrDB(q);}
function addIngrFromDB(nome,g){
  var p=getPizza(_ingrCid,_ingrPid);
  p.ingredienti=p.ingredienti||[];p.ingredienti.push({nome:nome,g:g});save();
  var il=document.getElementById('ingrList');
  if(il){var div=document.createElement('div');div.innerHTML=ingrRow(p.ingredienti.length-1,nome,g);il.appendChild(div.firstChild);}
}
function addIngrCustom(){
  var nome=document.getElementById('ingrCustomNome').value.trim();
  var g=parseFloat(document.getElementById('ingrCustomG').value)||0;
  if(!nome)return;
  addIngrFromDB(nome,g);
  document.getElementById('ingrCustomNome').value='';document.getElementById('ingrCustomG').value='';
  closeModal('modalIngr');
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

['modalClient','modalPizza'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});
